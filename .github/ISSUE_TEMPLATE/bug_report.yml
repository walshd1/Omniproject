name: Bug report
description: Something isn't working as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. **Do not** file security vulnerabilities here —
        see [SECURITY.md](../../blob/main/SECURITY.md) for private reporting.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure …
        2. Call …
        3. See error
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Demo mode (no n8n / no SSO)
        - Connected (n8n + backend)
        - Not sure
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OmniProject version/commit, Node version, deployment (local / docker / k8s), backend(s).
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste gateway logs or the API response. Redact tokens/secrets.
      render: shell
    validations:
      required: false
