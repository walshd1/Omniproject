# CodeQL configuration for OmniProject.
#
# We keep the broad `security-extended` suite, but filter ONE query that is a structural false
# positive in this codebase:
#
#   js/missing-rate-limiting — the ENTIRE /api surface is rate-limited by a single global
#   express-rate-limit middleware (`routes/index.ts`: `router.use(apiLimiter)`, backed by
#   `lib/rate-limit.ts`; auth endpoints add a tighter `loginLimiter`, analytics a stricter
#   `analyticsLimiter`). CodeQL can't trace that global middleware down to each individual route
#   handler, so it flags every authorized handler as "not rate-limited". The compensating control
#   genuinely exists and is applied before any route runs, so we exclude the query rather than
#   sprinkle redundant per-route limiters across dozens of handlers.
#
# Every other security-extended query stays active.
name: "OmniProject CodeQL config"

queries:
  - uses: security-extended

query-filters:
  - exclude:
      id: js/missing-rate-limiting
  # js/insufficient-password-hash (CWE-916) — a STRUCTURAL false positive here: OmniProject has NO
  # password authentication at all. Identity is entirely federated / passwordless (OIDC, SAML,
  # OAuth2, magic-link, WebAuthn passkey), so there is no user password to slow-hash. Every site the
  # query flags is one of:
  #   - an HMAC-SHA256 message-authentication code for INTEGRITY/signing (audit-chain, provenance,
  #     key-registry, session-key, broker-hmac, webhooks, field-cipher, rate-card, aws-sigv4, …),
  #   - HKDF-SHA256 / SHA-256 KEY DERIVATION from a HIGH-ENTROPY master secret — never a human
  #     passphrase (crypto-keys.deriveKey, config-crypto, vault-store). A production guard
  #     (lib/session-secret-guard) rejects weak/default master secrets outside dev, so the KDF's
  #     input keying material is strong by construction; a purpose-built password hash (bcrypt/
  #     scrypt/argon2) is neither required nor appropriate for high-entropy key material.
  #   - a content/integrity DIGEST (ETag, dedup id, canonical-JSON hash, key fingerprint),
  #   - PKCE (spec-mandated S256 = SHA-256) or WebAuthn (SHA-256 per the WebAuthn spec).
  # None of these hash a low-entropy secret, so the compensating control the query looks for does
  # not apply. Excluding the query keeps the Security tab focused on real product code, exactly as
  # with js/missing-rate-limiting above. If password auth is ever added, REMOVE this exclusion.
  - exclude:
      id: js/insufficient-password-hash
  # js/remote-property-injection (CWE-915) — a STRUCTURAL false positive here. CodeQL for JavaScript has NO
  # extensible sanitizer/barrier predicate (its models-as-data covers source/sink/summary/neutral/type only),
  # so the three barriers this codebase uses to make the class unexploitable are INVISIBLE to the query and it
  # flags every guarded write regardless:
  #   1. A GLOBAL body-parser reviver — `app.ts` mounts `express.json({ reviver: stripDangerousKeys })`, which
  #      strips __proto__/constructor/prototype from EVERY request body at every depth (qs `allowPrototypes:false`
  #      does the same for urlencoded). No `req.body`-derived key can be a prototype member by the time any route
  #      runs. CodeQL does not model a body-parser reviver.
  #   2. The `isForbiddenKey(k)` helper (`lib/safe-json.ts`, a `Set(["__proto__","constructor","prototype"]).has`
  #      wrapper) — called just before the write at every scoped-map sink (rate-card-store, scim, settings,
  #      ai-providers, key-registry, def-bindings, programmes, workflow, wbs-mapping, …). The `.has` sits one
  #      call frame away behind a boolean return, so CodeQL does not trace it as a barrier.
  #   3. Prototype-free / Map stores — the real self-hosted store is a `Map`; the demo/reference brokers, the def
  #      child-edge index, scim, and the def-binding resolver use `Object.create(null)`. A `Map`/null-proto write
  #      cannot pollute a prototype.
  # A three-part audit (routes, lib/broker, SPA) traced every remote-input->property-write and found ZERO
  # exploitable sink: each lands in a fresh/RBAC-gated object, a null-proto/Map store, a reviver-stripped body, or
  # an isForbiddenKey/allow-list/regex guard. The compensating control is real and applied before each write, and
  # the repo-local semgrep taint-scan (.semgrep/) independently guards the primary vector (untrusted
  # deserialization -> safeParseJson), request-scoped id injection, AND — restoring the exact write-vector
  # this exclusion drops — a request VALUE used as a computed object write-key (rule
  # `request-value-as-object-write-key`, taint-mode, guard-aware). Excluding
  # the query keeps the Security tab focused on real product code, exactly as with the two exclusions above.
  - exclude:
      id: js/remote-property-injection

# Analysis scope — do NOT scan test / bench / e2e sources. These are not shipped (zero production
# attack surface) but generate a large class of false positives: e.g. a *.test.ts transport-seam
# bridge that passes a url straight into fetch (js/request-forgery) where, in production, safeFetch()
# runs assertEgressAllowed() BEFORE the transport (see lib/egress.ts — it blocks cloud-metadata,
# link-local, RFC1918/loopback incl. DNS-rebinding, and non-http schemes). Excluding tests keeps the
# Security tab focused on real product code, so a genuine High/Critical can't hide in test noise.
paths-ignore:
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.integration.test.ts"
  - "**/__tests__/**"
  - "**/*.bench.ts"
  - "**/bench/**"
  - "artifacts/omniproject/e2e/**"
