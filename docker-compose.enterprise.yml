name: omniproject-enterprise

# OmniProject — Enterprise / BYO Mode (lightweight evaluation profile)
#
# Bring-Your-Own everything: external OIDC IdP, external project backends
# (Plane, OpenProject, Jira, Azure DevOps, …), and — if you want one — an
# external AI provider. This profile ships ONLY the two things OmniProject needs
# to run: the omni-shell and a single standalone n8n. No Authentik, no Traefik,
# no local databases, no local LLM — keeping the baseline footprint ~1.5 GB
# (well under 4 GB) for fast evaluation.
#
# Backends are reached by n8n over the network; their URLs are passed through as
# env (PLANE_INSTANCE_URL / OPENPROJECT_INSTANCE_URL / …) for n8n workflows to use.

networks:
  omni-enterprise:
    driver: bridge

volumes:
  n8n_enterprise_data:

services:
  # ── OmniProject Shell (SPA + gateway) ───────────────────────────────────────
  omni-shell:
    build:
      context: .
      dockerfile: Dockerfile
    image: omniproject-shell:latest
    container_name: omni-shell
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      BASE_PATH: /
      # Public origin of the shell — used to build the OIDC redirect URI.
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      # The single standalone n8n on the bridge network below.
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/omniproject}
      # ── BYO-SSO (required) ─────────────────────────────────────────────────
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL}       # e.g. https://your-idp.example.com/...
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET:-change-in-production}
      # ── Read-only API tokens for Power BI / scheduled exports (optional) ────
      API_TOKENS: ${API_TOKENS:-}
      # ── AI: BYO public provider (optional; no local LLM in this profile) ────
      AI_PROVIDER: ${AI_PROVIDER:-none}          # none | openrouter | openai | anthropic | ollama
      AI_MODEL: ${AI_MODEL:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-}                 # set to an external Ollama if used
    depends_on:
      - n8n
    networks:
      - omni-enterprise
    mem_limit: 512m
    restart: unless-stopped

  # ── n8n (single standalone broker) ──────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: omni-n8n
    ports:
      - "5678:5678"
    environment:
      N8N_PORT: 5678
      GENERIC_TIMEZONE: UTC
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
      DB_TYPE: sqlite
      WEBHOOK_URL: ${N8N_PUBLIC_URL:-http://localhost:5678/}
      # ── BYO backend endpoints (passed through for workflows to consume) ─────
      # Point these at your existing systems; any backend n8n can reach works.
      PLANE_INSTANCE_URL: ${PLANE_INSTANCE_URL:-}
      OPENPROJECT_INSTANCE_URL: ${OPENPROJECT_INSTANCE_URL:-}
    volumes:
      - n8n_enterprise_data:/home/node/.n8n
    networks:
      - omni-enterprise
    mem_limit: 1g
    restart: unless-stopped
