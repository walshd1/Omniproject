{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "omniproject.fullname" . }}
  labels:
    {{- include "omniproject.labels" . | nindent 4 }}
spec:
  # Applies to THIS gateway's pods only.
  podSelector:
    matchLabels:
      {{- include "omniproject.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Reach the gateway's http port. Restrict WHO by setting networkPolicy.ingress.from (e.g. the
    # ingress-controller namespace); with an empty `from`, any source may reach the port (source
    # control then lives at the ingress/LB layer).
    - ports:
        - port: http
          protocol: TCP
      {{- with .Values.networkPolicy.ingress.from }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  egress:
    # DNS is always permitted so the pod can resolve the broker / IdP / Redis / SMTP hostnames.
    - ports:
        - port: {{ .Values.networkPolicy.dnsPort | default 53 }}
          protocol: UDP
        - port: {{ .Values.networkPolicy.dnsPort | default 53 }}
          protocol: TCP
    {{- if .Values.networkPolicy.egress.restrict }}
    # Strict egress: ONLY DNS (above) + the explicitly-listed destinations below are allowed. List the
    # broker, Redis, IdP, SMTP and OTLP endpoints as NetworkPolicyEgressRule entries in egress.to.
    {{- with .Values.networkPolicy.egress.to }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- else }}
    # Egress not restricted (default): the pod may reach its backends — but NOT the cloud-metadata /
    # link-local ranges. NetworkPolicy is allow-list only, so "block only link-local" is expressed as
    # allow 0.0.0.0/0 (and ::/0) EXCEPT those ranges. Every real destination still works; only the
    # 169.254/fe80 SSRF targets are cut off at L3 (defence-in-depth beneath lib/egress.ts). Set
    # networkPolicy.egress.restrict=true and enumerate networkPolicy.egress.to for full segmentation.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
        - ipBlock:
            cidr: "::/0"
            except:
              - fe80::/10
              - fd00:ec2::/32
    {{- end }}
{{- end -}}
