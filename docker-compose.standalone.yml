name: omniproject-standalone

# OmniProject — Standalone Mode (full local stack)
# ─────────────────────────────────────────────────────────────────────────────
# Bundles everything for a self-contained local install: the omni-shell, n8n,
# Ollama, a local Authentik IdP, and Traefik terminating TLS for *.local.
#
# ONE-TIME BOOTSTRAP (TLS + hostnames + secrets) — see docs/DEPLOY-LOCAL.md:
#   1. Trust a local CA and mint certs (real TLS for *.local; ACME CANNOT issue
#      for .local, so we use mkcert + a Traefik file provider):
#        mkcert -install
#        mkdir -p certs
#        mkcert -cert-file certs/local.pem -key-file certs/local-key.pem \
#               app.local n8n.local authentik.local ollama.local traefik.local
#        cp "$(mkcert -CAROOT)/rootCA.pem" certs/rootCA.pem
#   2. Map the hostnames to loopback (browser side):
#        echo "127.0.0.1 app.local n8n.local authentik.local ollama.local traefik.local" | sudo tee -a /etc/hosts
#   3. Copy .env.example → .env and set the required secrets (compose fails fast
#      if any are missing). Remember: in a .env FILE every '$' in a value must be
#      written as '$$' (Compose interpolates .env) — see TRAEFIK_DASHBOARD_AUTH.
#
# Split-horizon, no hairpin: Traefik holds network aliases for every *.local name
# on omni-net, so the shell's server-side OIDC calls to https://authentik.local
# resolve straight to the proxy INSIDE the network (no host U-turn), while the
# browser resolves the same name via /etc/hosts. Single hostname → `iss` validates.

networks:
  omni-net:
    driver: bridge

volumes:
  n8n_data:
  ollama_data:
  authentik_pg_data:
  authentik_media:

services:
  # ── Filtered Docker socket for Traefik's provider ───────────────────────────
  # Traefik needs to read container labels + Docker events for dynamic routing, but mounting the raw
  # socket into an internet-facing proxy hands an attacker host-root on compromise. This proxy owns
  # the socket and exposes only a read-only subset (CONTAINERS + events; POST denied by default) on an
  # internal-only TCP port — nothing here publishes a host port.
  dockerproxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: omni-dockerproxy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      CONTAINERS: "1"   # read container list/inspect for label discovery
      NETWORKS: "1"     # read networks Traefik attaches routers to
      POST: "0"         # deny all writes — read-only Docker API (no create/exec/start)
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - omni-net
    restart: unless-stopped

  # ── Reverse proxy + TLS termination ─────────────────────────────────────────
  traefik:
    image: traefik:v3.7.5
    container_name: omni-traefik
    security_opt:
      - no-new-privileges:true
    command:
      - "--api.dashboard=true"          # dashboard ON but served behind auth (NOT --api.insecure)
      - "--ping=true"
      - "--providers.docker=true"
      # Reach Docker through the filtered, read-only socket-proxy (see the dockerproxy service) rather
      # than mounting /var/run/docker.sock into this internet-facing, TLS-terminating proxy. A Traefik
      # compromise then yields only the proxy's read-only container/event queries, not the raw Docker
      # API (which is effectively host-root).
      - "--providers.docker.endpoint=tcp://dockerproxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--log.level=WARN"
    ports:
      - "80:80"
      - "443:443"
      # NOTE: the :8080 dashboard port is deliberately NOT published. The
      # dashboard is reachable only via https://traefik.local behind basicauth.
    depends_on:
      - dockerproxy
    volumes:
      # No docker.sock here — Traefik talks to the filtered dockerproxy over the internal network.
      - "./traefik/dynamic:/etc/traefik/dynamic:ro"
      - "./certs:/certs:ro"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.local`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
      # htpasswd (bcrypt). Provided from .env — double every '$' to '$$' there.
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:?set TRAEFIK_DASHBOARD_AUTH in .env (htpasswd bcrypt; escape every $ as $$)}"
    networks:
      omni-net:
        aliases:
          - app.local
          - n8n.local
          - authentik.local
          - ollama.local
          - traefik.local
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── OmniProject shell (SPA + gateway) ───────────────────────────────────────
  omni-shell:
    build:
      context: .
      dockerfile: Dockerfile
    image: omniproject-shell:0.2.0
    container_name: omni-shell
    # Stateless gateway — lock it down: no privilege escalation, no caps, read-only
    # root fs (it writes nothing; /tmp is a tmpfs for any scratch).
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    environment:
      NODE_ENV: production
      PORT: 3000
      BASE_PATH: /
      PUBLIC_URL: https://app.local
      # 0.2.0+: the broker endpoint is BROKER_URL (n8n by default). Internal,
      # container-to-container over the bridge, so plain http to :5678 is fine.
      BROKER_URL: http://n8n:5678/webhook/omniproject
      # Single issuer hostname for browser AND backend (see split-horizon note).
      OIDC_ISSUER_URL: https://authentik.local/application/o/omniproject/
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-omniproject}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:?set OIDC_CLIENT_SECRET in .env}
      # Request the groups scope so the bundled IdP emits the user's role groups.
      OIDC_SCOPE: ${OIDC_SCOPE:-openid profile email groups}
      # Group → role mapping. The bundled blueprint creates these omni-* groups; add a staff
      # user to the group for their role. Override to match your own IdP's group names.
      OIDC_ADMIN_ROLES: ${OIDC_ADMIN_ROLES:-omni-admins}
      OIDC_PMO_ROLES: ${OIDC_PMO_ROLES:-omni-pmo}
      OIDC_MANAGER_ROLES: ${OIDC_MANAGER_ROLES:-omni-managers}
      OIDC_CONTRIBUTOR_ROLES: ${OIDC_CONTRIBUTOR_ROLES:-omni-contributors}
      OIDC_VIEWER_ROLES: ${OIDC_VIEWER_ROLES:-omni-viewers}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env (long random string)}
      # Node must trust the mkcert root CA to call https://authentik.local.
      NODE_EXTRA_CA_CERTS: /certs/rootCA.pem
      API_TOKENS: ${API_TOKENS:-}
      AI_PROVIDER: ${AI_PROVIDER:-none}        # none | ollama | openrouter | openai | anthropic
      AI_MODEL: ${AI_MODEL:-}
      OLLAMA_URL: http://ollama:11434
      # AI provider API keys are NOT passed in here — they live in the encrypted vault,
      # entered via Settings → AI providers. Only the vault root secret is set (defaults
      # to SESSION_SECRET-derived if VAULT_KEY is unset).
      VAULT_KEY: ${VAULT_KEY:-}
      # Boot to a known-good customer-archetype blueprint (see deploy/presets/). This full-local stack
      # defaults to the Demo/Trial posture; override to switch archetype:
      #   demo-trial | growth-business | nonprofit | agency-services | enterprise-pmo | regulated-selfhost
      SETTINGS_PRESET: ${SETTINGS_PRESET:-demo-trial}
    volumes:
      - "./certs:/certs:ro"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.omni.rule=Host(`app.local`)"
      - "traefik.http.routers.omni.entrypoints=websecure"
      - "traefik.http.routers.omni.tls=true"
      - "traefik.http.services.omni.loadbalancer.server.port=3000"
      # Transport compression at the edge (defence-in-depth: the gateway already
      # gzip/brotli-compresses, and Traefik skips anything already Content-Encoded
      # and honours no-transform, so SSE keeps streaming).
      - "traefik.http.middlewares.omni-compress.compress=true"
      - "traefik.http.routers.omni.middlewares=omni-compress"
    depends_on:
      n8n:
        condition: service_healthy
      authentik-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - omni-net
    restart: unless-stopped

  # ── n8n (the bundled reference broker) ──────────────────────────────────────
  n8n:
    image: n8nio/n8n:1.123.61   # pinned for reproducibility; 2.x exists but is unverified against the bundled blueprint
    container_name: omni-n8n
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    environment:
      N8N_HOST: n8n.local
      N8N_PORT: 5678
      N8N_PROTOCOL: https        # URL generation only; TLS is terminated at Traefik
      N8N_PROXY_HOPS: 1
      WEBHOOK_URL: https://n8n.local/
      GENERIC_TIMEZONE: UTC
      DB_TYPE: sqlite
      # n8n prompts you to create an owner account on first run (the old
      # N8N_BASIC_AUTH_* env vars are deprecated/ignored on current n8n).
    volumes:
      - n8n_data:/home/node/.n8n
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.local`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls=true"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5678/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - omni-net
    restart: unless-stopped

  # ── Ollama (local LLM) ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.30.10
    container_name: omni-ollama
    security_opt:
      - no-new-privileges:true
    # Model loads are memory-hungry — cap it so a large pull can't OOM the host.
    # Raise to fit the largest model you intend to run.
    mem_limit: 8g
    volumes:
      - ollama_data:/root/.ollama
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ollama.rule=Host(`ollama.local`)"
      - "traefik.http.routers.ollama.entrypoints=websecure"
      - "traefik.http.routers.ollama.tls=true"
      - "traefik.http.services.ollama.loadbalancer.server.port=11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - omni-net
    restart: unless-stopped

  # ── Authentik (local IdP) ───────────────────────────────────────────────────
  authentik-postgres:
    image: postgres:16.14-alpine
    container_name: omni-authentik-pg
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_PG_PASSWORD:?set AUTHENTIK_PG_PASSWORD in .env}
    volumes:
      - authentik_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - omni-net
    restart: unless-stopped

  # NOTE: Authentik removed its Redis dependency in 2025.10 (caching, the embedded
  # outpost, and websockets moved to PostgreSQL), so 2026.5.x needs Postgres only —
  # there is deliberately no Redis service here.
  authentik-server:
    image: ghcr.io/goauthentik/server:2026.5.3
    container_name: omni-authentik-server
    command: server
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASSWORD:?set AUTHENTIK_PG_PASSWORD in .env}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?set AUTHENTIK_SECRET_KEY in .env (50+ random chars)}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      # The bundled blueprint sets the OmniProject provider's client secret from this, so the
      # shell + the IdP share ONE value (set OIDC_CLIENT_SECRET in .env).
      AUTHENTIK_OMNI_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:?set OIDC_CLIENT_SECRET in .env}
    volumes:
      - authentik_media:/media
      # Auto-create the OmniProject OAuth app + omni-* role groups on boot (see infra/authentik).
      - ./infra/authentik/blueprints:/blueprints/omniproject:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`authentik.local`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"
      - "traefik.http.routers.authentik.tls=true"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s     # cold first boot pulls the image + runs DB migrations
    depends_on:
      authentik-postgres:
        condition: service_healthy
    networks:
      - omni-net
    restart: unless-stopped

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.5.3
    container_name: omni-authentik-worker
    command: worker
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASSWORD:?set AUTHENTIK_PG_PASSWORD in .env}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?set AUTHENTIK_SECRET_KEY in .env (50+ random chars)}
      AUTHENTIK_OMNI_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:?set OIDC_CLIENT_SECRET in .env}
    volumes:
      - authentik_media:/media
      # The worker applies blueprints — mount the OmniProject bootstrap here too.
      - ./infra/authentik/blueprints:/blueprints/omniproject:ro
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    depends_on:
      authentik-postgres:
        condition: service_healthy
    networks:
      - omni-net
    restart: unless-stopped
