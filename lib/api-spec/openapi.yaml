openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: OmniProject API — thin proxy gateway to n8n webhooks
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: proxy
    description: n8n proxy gateway
  - name: projects
    description: Project and issue management via n8n
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /broker/command:
    post:
      operationId: brokerCommand
      tags: [proxy]
      summary: Forward a generic action to the broker
      description: >-
        Packages a user action with the OIDC token and forwards it to the active
        broker (the command-palette passthrough). Legacy alias: POST /n8n-proxy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrokerCommandInput"
      responses:
        "200":
          description: Broker response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerCommandResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Broker error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      description: Fetches normalized project list via n8n
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /programmes:
    get:
      operationId: listProgrammes
      tags: [projects]
      summary: List programmes (derived from project membership)
      description: >-
        Programmes are derived by grouping projects on programmeId, with rolled-up
        stats. A programme always contains at least one project; projects without
        a programmeId are standalone and excluded here.
      responses:
        "200":
          description: Programmes with roll-up stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Programme"

  /programmes/{programmeId}:
    get:
      operationId: getProgramme
      tags: [projects]
      summary: A programme with its member projects (programme-wide view)
      parameters:
        - name: programmeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Programme detail + member projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgrammeDetail"
        "404":
          description: No such programme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/issues:
    get:
      operationId: getProjectIssues
      tags: [projects]
      summary: List issues for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of issues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Issue"
    post:
      operationId: createIssue
      tags: [projects]
      summary: Create a new issue
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueInput"
      responses:
        "201":
          description: Created issue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"

  /projects/{projectId}/issues/{issueId}:
    patch:
      operationId: updateIssue
      tags: [projects]
      summary: Update an issue
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueUpdate"
      responses:
        "200":
          description: Updated issue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "409":
          description: >-
            Optimistic-concurrency conflict — the issue changed since it was read
            (expectedVersion no longer matches). The current server state is
            returned so the client can rebase and retry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictResponse"
    delete:
      operationId: deleteIssue
      tags: [projects]
      summary: Delete an issue
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/summary:
    get:
      operationId: getProjectSummary
      tags: [projects]
      summary: Get project summary stats
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"

  /projects/{projectId}/capacity:
    get:
      operationId: getProjectCapacity
      tags: [projects]
      summary: Resource capacity & workload allocation for a project
      description: "Routed to n8n with X-OmniProject-Action: get_resource_capacity, X-OmniProject-Source: capacity_engine"
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resource capacity rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResourceCapacity"

  /projects/{projectId}/financials:
    get:
      operationId: getProjectFinancials
      tags: [projects]
      summary: Earned Value Management (EVM) financials for a project
      description: "Routed to n8n with X-OmniProject-Action: get_project_financials, X-OmniProject-Source: financial_ledger"
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project financials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFinancials"

  /projects/{projectId}/history:
    get:
      operationId: getProjectHistory
      tags: [projects]
      summary: Time-phased progress history for a project
      description: >-
        Trend of completion / scope over time. Sourced from the underlying system
        of record (e.g. OpenProject journals/activity) via n8n
        (X-OmniProject-Action: get_project_history, X-OmniProject-Source:
        history_provider). OmniProject stores nothing itself — it is a stateless
        overlay, so the backend remains authoritative for history.
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ordered history points (oldest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectHistoryPoint"

  /projects/{projectId}/baseline:
    get:
      operationId: getProjectBaseline
      tags: [projects]
      summary: Approved schedule/scope baseline for a project
      description: >-
        The approved baseline held in the system of record (e.g. an OpenProject
        baseline), surfaced via n8n (X-OmniProject-Action: get_baseline,
        X-OmniProject-Source: baseline_store). Returns null when the backend has
        no baseline captured. OmniProject never writes its own baseline store.
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Baseline, or null when none is held by the backend
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ProjectBaseline"
                  - type: "null"

  /projects/{projectId}/raid:
    get:
      operationId: getProjectRaid
      tags: [projects]
      summary: RAID log (Risks, Assumptions, Issues, Dependencies) for a project
      description: "Routed to n8n with X-OmniProject-Action: get_raid, X-OmniProject-Source: raid_register"
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: RAID entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RaidEntry"
    post:
      operationId: createRaidEntry
      tags: [projects]
      summary: Add a RAID entry (written to the system of record via n8n)
      description: "Routed to n8n with X-OmniProject-Action: create_raid_entry, X-OmniProject-Source: raid_register. Requires a contributor role or higher."
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RaidEntryInput"
      responses:
        "201":
          description: Created RAID entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RaidEntry"

  /notifications:
    get:
      operationId: listNotifications
      tags: [projects]
      summary: Notifications for the current user
      description: "Routed to n8n with X-OmniProject-Action: get_notifications, X-OmniProject-Source: notification_center"
      responses:
        "200":
          description: Notification entries (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /portfolio/health:
    get:
      operationId: getPortfolioHealth
      tags: [projects]
      summary: Portfolio-wide multi-project health aggregation
      description: "Routed to n8n with X-OmniProject-Action: get_portfolio_health, X-OmniProject-Source: portfolio_master"
      responses:
        "200":
          description: Portfolio health summary rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioHealthSummary"

  /activity:
    get:
      operationId: listActivity
      tags: [projects]
      summary: Recent activity feed across all projects
      responses:
        "200":
          description: Activity entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

  /capabilities:
    get:
      operationId: getCapabilities
      tags: [proxy]
      summary: Which data domains the wired backend(s) can populate
      description: >-
        Sourced from n8n (action get_capabilities, source capability_probe) so the
        UI can pre-emptively label which reports/views are available. Falls back to
        the CAPABILITIES env override, or demo defaults.
      responses:
        "200":
          description: Capability flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capabilities"

  /settings:
    get:
      operationId: getSettings
      tags: [proxy]
      summary: Get integration settings
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [proxy]
      summary: Update integration settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    BrokerCommandInput:
      type: object
      properties:
        action:
          type: string
          description: Action name (e.g. "create_ticket", "update_status")
        payload:
          type: object
          additionalProperties: true
        source:
          type: string
          description: Backend routing hint (free-form; e.g. "all", "jira", "plane")
        idempotencyKey:
          type: string
          description: >-
            Deterministic dedupe key the gateway appends (also sent as the
            X-OmniProject-Idempotency-Key header) so the broker can drop
            duplicate triggers within the same minute.
        origin:
          type: string
          description: System initiating the action (defaults to "omniproject").
      required:
        - action
        - payload

    BrokerCommandResult:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          additionalProperties: true
        message:
          type: ["string", "null"]
      required:
        - success

    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        identifier:
          type: string
        description:
          type: ["string", "null"]
        source:
          type: string
          description: plane or openproject
        programmeId:
          type: ["string", "null"]
          description: >-
            Optional programme this project belongs to (owned by the backend). A
            project with no programmeId is standalone; OmniProject derives the
            programme grouping from this field, so a programme exists only when at
            least one project references it.
        programmeName:
          type: ["string", "null"]
        issueCount:
          type: integer
        completedCount:
          type: integer
        memberCount:
          type: integer
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - identifier
        - source
        - issueCount
        - completedCount
        - memberCount
        - updatedAt

    Programme:
      type: object
      description: A grouping of related projects, derived from project membership.
      properties:
        id:
          type: string
        name:
          type: string
        projectCount:
          type: integer
        issueCount:
          type: integer
        completedCount:
          type: integer
        completionRate:
          type: number
        ragStatus:
          type: string
          enum: [GREEN, AMBER, RED]
        updatedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - name
        - projectCount
        - issueCount
        - completedCount
        - completionRate
        - ragStatus

    ProgrammeDetail:
      type: object
      description: A programme plus its member projects (the programme-wide view).
      properties:
        id:
          type: string
        name:
          type: string
        projectCount:
          type: integer
        issueCount:
          type: integer
        completedCount:
          type: integer
        completionRate:
          type: number
        ragStatus:
          type: string
          enum: [GREEN, AMBER, RED]
        updatedAt:
          type: ["string", "null"]
          format: date-time
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
      required:
        - id
        - name
        - projectCount
        - issueCount
        - completedCount
        - completionRate
        - ragStatus
        - projects

    Issue:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          description: "Backend-agnostic status string. Conventional buckets are backlog, todo, in_progress, in_review, done, cancelled; other backends may use their own values (the broker workflow normalises them)."
        priority:
          type: string
          enum: [none, urgent, high, medium, low]
        assignee:
          type: ["string", "null"]
        labels:
          type: array
          items:
            type: string
        startDate:
          type: ["string", "null"]
          format: date
        dueDate:
          type: ["string", "null"]
          format: date
        source:
          type: string
        version:
          type: ["integer", "null"]
          description: >-
            Optimistic-concurrency token mirrored from the system of record
            (e.g. OpenProject lockVersion). Sent back as expectedVersion on
            update so a stale edit is rejected with 409 instead of silently
            overwriting a concurrent change.
        lastUpdatedBy:
          type: ["string", "null"]
          description: >-
            Origin system/principal that last mutated this issue (e.g.
            "omniproject", "plane", "openproject"). n8n compares this against the
            change origin to drop circular sync loops (webhook storms).
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - title
        - status
        - priority
        - labels
        - source
        - createdAt
        - updatedAt

    IssueInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        status:
          type: string
          description: "Backend-agnostic status string. Conventional buckets are backlog, todo, in_progress, in_review, done, cancelled; other backends may use their own values (the broker workflow normalises them)."
        priority:
          type: string
          enum: [none, urgent, high, medium, low]
        assignee:
          type: ["string", "null"]
        labels:
          type: array
          items:
            type: string
        startDate:
          type: ["string", "null"]
          format: date
        dueDate:
          type: ["string", "null"]
          format: date
      required:
        - title

    IssueUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        status:
          type: string
          description: "Backend-agnostic status string. Conventional buckets are backlog, todo, in_progress, in_review, done, cancelled; other backends may use their own values (the broker workflow normalises them)."
        priority:
          type: string
          enum: [none, urgent, high, medium, low]
        assignee:
          type: ["string", "null"]
        labels:
          type: array
          items:
            type: string
        startDate:
          type: ["string", "null"]
          format: date
        dueDate:
          type: ["string", "null"]
          format: date
        origin:
          type: string
          description: >-
            System initiating this update (defaults to "omniproject" at the
            gateway). Carried downstream so n8n can drop overlapping loop
            mutations where origin === the target's lastUpdatedBy.
        expectedVersion:
          type: integer
          description: >-
            The version the client last saw. When present the gateway/backend
            performs an optimistic-concurrency check and rejects the write with
            409 if the issue has moved on, instead of clobbering it.

    ProjectSummary:
      type: object
      properties:
        projectId:
          type: string
        total:
          type: integer
        byStatus:
          type: object
          additionalProperties:
            type: integer
        byPriority:
          type: object
          additionalProperties:
            type: integer
        completionRate:
          type: number
        overdue:
          type: integer
      required:
        - projectId
        - total
        - byStatus
        - byPriority
        - completionRate
        - overdue

    ResourceCapacity:
      type: object
      properties:
        resourceId:
          type: string
        resourceName:
          type: string
        role:
          type: string
        allocationPercentage:
          type: integer
        assignedHours:
          type: number
        availableHours:
          type: number
        utilizationState:
          type: string
          enum: [OVER_ALLOCATED, OPTIMAL, UNDER_ALLOCATED]
      required:
        - resourceId
        - resourceName
        - role
        - allocationPercentage
        - assignedHours
        - availableHours
        - utilizationState

    ProjectFinancials:
      type: object
      properties:
        currency:
          type: string
        budgetAllocated:
          type: number
        actualBurn:
          type: number
        earnedValue:
          type: number
        cpi:
          type: number
        spi:
          type: number
        financialHealth:
          type: string
          enum: [GREEN, AMBER, RED]
        forecastCostAtCompletion:
          type: number
        provenance:
          $ref: "#/components/schemas/Provenance"
      required:
        - currency
        - budgetAllocated
        - actualBurn
        - earnedValue
        - cpi
        - spi
        - financialHealth
        - forecastCostAtCompletion

    PortfolioHealthSummary:
      type: object
      properties:
        projectId:
          type: string
        projectName:
          type: string
        ragStatus:
          type: string
          enum: [GREEN, AMBER, RED]
        scheduleVarianceDays:
          type: integer
        budgetVariancePercentage:
          type: number
        activeBlockersCount:
          type: integer
      required:
        - projectId
        - projectName
        - ragStatus
        - scheduleVarianceDays
        - budgetVariancePercentage
        - activeBlockersCount

    ActivityEntry:
      type: object
      properties:
        id:
          type: string
        action:
          type: string
        actor:
          type: string
        projectId:
          type: string
        issueId:
          type: ["string", "null"]
        issueTitle:
          type: ["string", "null"]
        detail:
          type: ["string", "null"]
        timestamp:
          type: string
          format: date-time
      required:
        - id
        - action
        - actor
        - projectId
        - timestamp

    Capabilities:
      type: object
      description: Data domains the wired backend(s) can populate.
      properties:
        mode:
          type: string
          description: How capabilities were resolved (n8n | env | demo).
        issues:
          type: boolean
        scheduling:
          type: boolean
        resources:
          type: boolean
        financials:
          type: boolean
        portfolio:
          type: boolean
        baseline:
          type: boolean
        blockers:
          type: boolean
        history:
          type: boolean
        raid:
          type: boolean
      required:
        - mode
        - issues
        - scheduling
        - resources
        - financials
        - portfolio
        - baseline
        - blockers
        - history
        - raid

    Settings:
      type: object
      properties:
        brokerUrl:
          type: ["string", "null"]
          description: The active broker's webhook/endpoint URL (n8n by default).
        aiProvider:
          type: string
          enum: [none, openai, ollama, anthropic, openrouter]
        aiModel:
          type: ["string", "null"]
        backendSource:
          type: string
          description: >-
            Free-form backend routing hint passed to the broker (e.g. "all",
            "jira", "azure-devops", "servicenow", "plane", "openproject"). "all"
            means no filter — whatever the broker is wired to.
        oidcIssuerUrl:
          type: ["string", "null"]
      required:
        - aiProvider
        - backendSource

    SettingsUpdate:
      type: object
      properties:
        brokerUrl:
          type: ["string", "null"]
        aiProvider:
          type: string
          enum: [none, openai, ollama, anthropic, openrouter]
        aiModel:
          type: ["string", "null"]
        backendSource:
          type: string
          description: >-
            Free-form backend routing hint passed to the broker (see Settings.backendSource).
        oidcIssuerUrl:
          type: ["string", "null"]

    Provenance:
      type: string
      description: >-
        Where a figure came from, so the UI never presents a synthesised number
        as fact. "sourced" = read from the backend system of record via n8n;
        "derived" = computed by the gateway from real issue data; "sample" =
        demo/placeholder data (no backend wired).
      enum: [sourced, derived, sample]

    ConflictResponse:
      type: object
      properties:
        error:
          type: string
        current:
          $ref: "#/components/schemas/Issue"
      required:
        - error

    ProjectHistoryPoint:
      type: object
      description: One point on a project's progress trend.
      properties:
        date:
          type: string
          format: date
        completionRate:
          type: number
          description: Percent of issues done at this point (0–100).
        totalIssues:
          type: integer
        completedIssues:
          type: integer
        openBlockers:
          type: ["integer", "null"]
        provenance:
          $ref: "#/components/schemas/Provenance"
      required:
        - date
        - completionRate
        - totalIssues
        - completedIssues
        - provenance

    BaselineItem:
      type: object
      properties:
        issueId:
          type: string
        title:
          type: string
        plannedStart:
          type: ["string", "null"]
          format: date
        plannedFinish:
          type: ["string", "null"]
          format: date
      required:
        - issueId
        - title

    ProjectBaseline:
      type: object
      description: An approved baseline held by the backend system of record.
      properties:
        projectId:
          type: string
        name:
          type: string
        capturedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/BaselineItem"
        provenance:
          $ref: "#/components/schemas/Provenance"
      required:
        - projectId
        - capturedAt
        - items
        - provenance

    RaidEntry:
      type: object
      description: A Risk, Assumption, Issue or Dependency log entry.
      properties:
        id:
          type: string
        projectId:
          type: string
        type:
          type: string
          enum: [risk, assumption, issue, dependency]
        title:
          type: string
        description:
          type: ["string", "null"]
        severity:
          type: string
          enum: [low, medium, high, critical]
        likelihood:
          type: ["string", "null"]
          enum: [low, medium, high, null]
        impact:
          type: ["string", "null"]
          enum: [low, medium, high, null]
        status:
          type: string
          enum: [open, mitigating, closed]
        owner:
          type: ["string", "null"]
        mitigation:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
          format: date
        provenance:
          $ref: "#/components/schemas/Provenance"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - type
        - title
        - severity
        - status
        - createdAt
        - updatedAt

    RaidEntryInput:
      type: object
      properties:
        type:
          type: string
          enum: [risk, assumption, issue, dependency]
        title:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        severity:
          type: string
          enum: [low, medium, high, critical]
        likelihood:
          type: ["string", "null"]
          enum: [low, medium, high, null]
        impact:
          type: ["string", "null"]
          enum: [low, medium, high, null]
        status:
          type: string
          enum: [open, mitigating, closed]
        owner:
          type: ["string", "null"]
        mitigation:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
          format: date
      required:
        - type
        - title
        - severity

    Notification:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
          description: e.g. "assignment", "mention", "due_soon", "blocker", "status_change".
        title:
          type: string
        body:
          type: ["string", "null"]
        projectId:
          type: ["string", "null"]
        issueId:
          type: ["string", "null"]
        read:
          type: boolean
        timestamp:
          type: string
          format: date-time
      required:
        - id
        - kind
        - title
        - read
        - timestamp
