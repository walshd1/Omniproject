rules:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Untrusted deserialization must go through safeParseJson (prototype-pollution).
  #    High confidence — this mirrors the node:test ratchet in
  #    artifacts/api-server/src/__tests__/no-unsafe-json-parse.test.ts, giving an
  #    independent, tool-based check of the same invariant.
  # ────────────────────────────────────────────────────────────────────────────
  - id: bare-json-parse-use-safeparsejson
    languages: [typescript]
    severity: WARNING
    message: >
      Bare JSON.parse on this path. If the input is UNTRUSTED (HTTP body, cross-replica
      bus/shared-KV message, external-peer response, a JWT before verification, an LLM
      reply) use safeParseJson (lib/safe-json.ts), which strips __proto__/constructor/
      prototype at every depth. If it is TRUSTED (sealed/decrypted config, a signature-
      verified blob, a secret-manager response, own at-rest store data, a CLI arg) add it
      to the ALLOWLIST in no-unsafe-json-parse.test.ts with a reason.
    patterns:
      - pattern: JSON.parse(...)
    paths:
      exclude:
        - "**/*.test.ts"
        - "artifacts/api-server/src/lib/safe-json.ts"

  # NOTE: the former rule 2 (projectid-from-request-without-scope-guard) was removed. Its
  # `{ ... guardProjectScope(...) ... }` idiom no longer parses under semgrep 1.90.0, and every
  # parse-safe rewrite is high-FP (it can't see guards behind withBrokerErrors wrappers, async
  # arrows, or custom scope helpers like filterTasksInScope / trendScopeAllowed). It was only ever
  # a "second opinion" — the authoritative IDOR control is the enumerated, behaviourally-probing
  # route-scope-coverage.test.ts ratchet (asserts 403 for an out-of-scope id), which stands.

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Remote property injection (CWE-915): a request VALUE (params/query/body/headers)
  #    used as a computed object WRITE-key. This is the exact vector the excluded
  #    js/remote-property-injection query leaves uncovered (see
  #    .github/codeql/codeql-config.yml): the global express.json reviver strips dangerous
  #    KEYS from bodies, but NOT a request VALUE later used as a key. Taint-mode, with
  #    focus-metavariable so only taint in the KEY position fires (a request used as a
  #    VALUE — `store[k] = req.body.v` — is fine and does not match), and the codebase's
  #    key-guards as sanitizers. Verified ZERO findings on the current tree (the audited
  #    sinks are guarded / String()-wrapped / interprocedural); it exists to catch a
  #    FUTURE `const id = req.params.id; store[id] = …` regression. Advisory (the
  #    taint-scan job is continue-on-error) — a rare guarded-but-flagged case can carry a
  #    `// nosemgrep: request-value-as-object-write-key` with a reason.
  # ────────────────────────────────────────────────────────────────────────────
  - id: request-value-as-object-write-key
    languages: [typescript]
    severity: WARNING
    mode: taint
    message: >
      A request value is used as a computed object write-key (remote property injection,
      CWE-915). A key of "__proto__"/"constructor"/… would mutate the target's prototype or
      shadow a member. Reject a reserved key first (isForbiddenKey from lib/safe-json, or an
      allow-list check), or write into a prototype-free store (Object.create(null) / Map).
      The express.json reviver does NOT help — it strips dangerous body KEYS, not a request
      VALUE used as a key.
    pattern-sources:
      - patterns:
          - pattern-either:
              - pattern: $REQ.params.$X
              - pattern: $REQ.params[$X]
              - pattern: $REQ.query.$X
              - pattern: $REQ.query[$X]
              - pattern: $REQ.body.$X
              - pattern: $REQ.body[$X]
              - pattern: $REQ.headers[$X]
          - metavariable-regex:
              metavariable: $REQ
              regex: ^(req|request)$
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $O[$SINK] = $V
              - pattern: $O[$SINK] ??= $V
              - pattern: delete $O[$SINK]
          - focus-metavariable: $SINK
    pattern-sanitizers:
      - pattern: isForbiddenKey(...)
      - pattern: safeScopeKey(...)
      - pattern: safeId(...)
      - pattern: $C.has(...)
      - pattern: $C.includes(...)
      - pattern: $C.test(...)
      - pattern: assertProjectScope(...)
      - pattern: inScope(...)
    paths:
      include:
        - "artifacts/api-server/src/**/*.ts"
      exclude:
        - "**/*.test.ts"
