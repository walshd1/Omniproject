    Issue:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          description: "Backend-agnostic status string. Conventional buckets are backlog, todo, in_progress, in_review, done, cancelled; other backends may use their own values (the broker workflow normalises them)."
        priority:
          type: string
          enum: [none, urgent, high, medium, low]
        assignee:
          type: ["string", "null"]
        labels:
          type: array
          items:
            type: string
        startDate:
          type: ["string", "null"]
          format: date
        dueDate:
          type: ["string", "null"]
          format: date
        source:
          type: string
        version:
          type: ["integer", "null"]
          description: >-
            Optimistic-concurrency token mirrored from the system of record
            (e.g. OpenProject lockVersion). Sent back as expectedVersion on
            update so a stale edit is rejected with 409 instead of silently
            overwriting a concurrent change.
        lastUpdatedBy:
          type: ["string", "null"]
          description: >-
            Origin system/principal that last mutated this issue (e.g.
            "omniproject", "plane", "openproject"). the broker compares this against the
            change origin to drop circular sync loops (webhook storms).
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        budget:
          type: ["number", "null"]
          description: Per-task budget (financial field group; surfaced only when the backend supports financials).
        actualCost:
          type: ["number", "null"]
        billable:
          type: ["boolean", "null"]
        costCenter:
          type: ["string", "null"]
        currency:
          type: ["string", "null"]
        estimateHours:
          type: ["number", "null"]
          description: Estimated effort in hours (effort field group; surfaced only when the backend tracks effort).
        loggedHours:
          type: ["number", "null"]
          description: Effort logged so far, in hours (effort field group).
        remainingHours:
          type: ["number", "null"]
          description: Remaining effort in hours (effort field group).
        storyPoints:
          type: ["number", "null"]
          description: Agile story-point estimate (agile field group; surfaced only when the backend tracks agile fields).
        healthStatus:
          type: ["string", "null"]
          description: Delivery health / RAG (quality field group). Free-form to preserve the backend's vocabulary.
        riskLevel:
          type: ["string", "null"]
        impact:
          type: ["string", "null"]
        urgency:
          type: ["string", "null"]
        blocked:
          type: ["boolean", "null"]
        blockedReason:
          type: ["string", "null"]
        mitigation:
          type: ["string", "null"]
        defectCount:
          type: ["number", "null"]
        expenditureType:
          type: ["string", "null"]
          description: CapEx/OpEx classification (financial field group). Free-form (capex/opex/mixed).
        capexAmount:
          type: ["number", "null"]
          description: Capitalised (capital) portion of cost (financial field group).
        opexAmount:
          type: ["number", "null"]
          description: Operating-expense portion of cost (financial field group).
        costCategory:
          type: ["string", "null"]
          description: GL / cost category for roll-up grouping (financial field group).
        depreciationMonths:
          type: ["number", "null"]
          description: Useful-life in months for capex amortisation (financial field group).
        revenue:
          type: ["number", "null"]
          description: Projected / recognised income for this item (financial field group).
        invoicedAmount:
          type: ["number", "null"]
          description: Amount actually invoiced to the customer to date (financial field group).
        purchaseOrder:
          type: ["string", "null"]
          description: Customer purchase-order / order reference for billing (financial field group).
        riceScore:
          type: ["number", "null"]
          description: >-
            Reach × Impact × Confidence ÷ Effort prioritisation score (agile field group),
            surfaced for the portfolio prioritisation ranking. Many backends precompute this.
        wsjf:
          type: ["number", "null"]
          description: Weighted Shortest Job First score (agile field group; SAFe), surfaced for the portfolio prioritisation ranking.
        moscow:
          type: ["string", "null"]
          description: MoSCoW prioritisation bucket (agile field group). Free-form (e.g. must/should/could/wont).
        strategicContribution:
          type: ["number", "null"]
          description: How much this item contributes to its linked strategic goal(s), 0–100 (strategy field group).
        strategicGoals:
          type: array
          items:
            type: string
          description: The strategic goal(s) this item supports (strategy field group).
        benefitType:
          type: ["string", "null"]
          description: Benefit classification (benefits field group). Free-form (e.g. cashable/non_cashable/social).
        benefitOwner:
          type: ["string", "null"]
          description: Accountable owner for the benefit (benefits field group).
        plannedBenefitValue:
          type: ["number", "null"]
          description: Target benefit value (benefits field group).
        actualBenefitValue:
          type: ["number", "null"]
          description: Benefit value realised to date (benefits field group).
        benefitMeasure:
          type: ["string", "null"]
          description: The KPI / unit the benefit moves (benefits field group).
        benefitBaseline:
          type: ["number", "null"]
          description: Starting metric value before the benefit (benefits field group).
        benefitTarget:
          type: ["number", "null"]
          description: Target metric value for the benefit (benefits field group).
        benefitStartDate:
          type: ["string", "null"]
          format: date
          description: When benefit realisation starts (benefits field group).
        benefitDueDate:
          type: ["string", "null"]
          format: date
          description: Realise-by date (benefits field group).
        benefitStatus:
          type: ["string", "null"]
          description: Realisation health (benefits field group). Free-form (e.g. on_track/at_risk/realised/missed).
        benefitConfidence:
          type: ["number", "null"]
          description: Confidence the benefit will be realised, 0–100 (benefits field group).
        customFields:
          type: object
          additionalProperties: true
          description: >-
            Backend-specific fields that aren't (yet) canonical — carried through
            verbatim so ANY data the backend captures can be mapped and surfaced,
            gated by capabilities.entities.customField. Promote to a first-class
            field via the registry when it earns it.
      required:
        - id
        - projectId
        - title
        - status
        - priority
        - labels
        - source
        - createdAt
        - updatedAt

