      #   uses: docker/login-action@v3
      #   with: { registry: ghcr.io, username: ${{ github.actor }}, password: ${{ secrets.GITHUB_TOKEN }} }
      # - name: Tag & push
      #   run: |
      #     docker tag omni-shell:${{ github.ref_name }} ghcr.io/${{ github.repository }}:${{ github.ref_name }}
      #     docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
      #   # then re-run attest-build-provenance with the pushed registry digest as subject.
