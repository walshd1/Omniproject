version: 2

# Keeps deploy image pins and CI actions fresh so they don't quietly rot the way
# the deploy files did before. Note: the `docker` ecosystem scans the Dockerfile
# AND docker-compose.*.yml image: pins, but NOT the k8s manifest image — review
# k8s-enterprise-manifest.yaml's pins (and the intentional n8n 1.x hold) manually.
# All bump PRs open against `next` (the standing development branch), not `main`.
# `main` is the stable release line; dependency updates are validated on `next`'s CI
# and ride into `main` with the next promotion. See docs/BRANCHING.md.
updates:
  - package-ecosystem: docker
    directory: "/"
    target-branch: "next"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      deploy-images:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: "next"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: "/"
    target-branch: "next"
    schedule:
      interval: weekly
    open-pull-requests-limit: 8
    groups:
      # Only minor/patch dev-deps get batched. A single 46-package batch (dev-deps,
      # PR #347) silently carried FIVE breaking major bumps (typescript, vitest +
      # @vitest/coverage-v8, recharts, react-day-picker, react-resizable-panels) past
      # review — CI caught it, but by then it was one huge diff to untangle instead of
      # five small, independently revertable ones. Excluding "major" here means an
      # unmatched major-bump PR gets its own individual PR (not grouped, not batched),
      # so each is small, bisectable, and CI failure on one never blocks the rest —
      # raised the open-PR cap accordingly since majors no longer collapse into one PR.
      dev-deps:
        dependency-type: development
        update-types: ["minor", "patch"]
    ignore:
      # 2.x -> 4.12.0 (a 46-package dev-deps batch) silently broke CI: the new major
      # renamed every export (PanelGroup/Panel/PanelResizeHandle -> Group/Panel/Separator)
      # and dropped the data-panel-group-direction attribute components/ui/resizable.tsx
      # styles against. Held at 2.x until someone deliberately migrates that component to
      # the new API (it currently has zero usages, so there was no test coverage to catch
      # this at review time — only the typecheck did).
      - dependency-name: "react-resizable-panels"
        update-types: ["version-update:semver-major"]
