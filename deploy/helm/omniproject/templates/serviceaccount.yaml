{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "omniproject.serviceAccountName" . }}
  labels:
    {{- include "omniproject.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The gateway needs no Kubernetes API access.
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end -}}
