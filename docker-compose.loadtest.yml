# OmniProject — load-test harness stack (NOT a production deploy).
#
# Brings up the real path the load harness measures: gateway → n8n (QUEUE MODE,
# horizontally scalable workers) → a real backend (OpenProject). This is the
# stack docs/ops/LOAD-HARNESS.md refers to — `docker compose up` instead of
# "stand up n8n queue mode + a backend" by hand.
#
#   docker compose -f docker-compose.loadtest.yml up -d
#   docker compose -f docker-compose.loadtest.yml up -d --scale n8n-worker=4   # scale workers
#   OMNI_API_BASE=http://localhost:5000 LOAD_READS=4000 LOAD_WRITE_CYCLES=200 \
#     pnpm --filter @workspace/scripts run load
#
# One-time manual setup (documented, not automated here): import the OmniProject
# n8n blueprint into n8n and point its nodes at OpenProject. Until then the
# harness will report broker errors — which is itself a useful signal.
#
# This file is deliberately NOT a production artifact (plain secrets, no TLS); it
# is a disposable measurement rig. Wires the broker under BROKER_URL (current name).

services:
  # ── Queue backend for n8n (Bull/Redis) ──────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ── n8n's own database (queue mode needs a shared DB, not SQLite) ────────────
  n8n-db:
    image: postgres:16.14-alpine
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n
      POSTGRES_DB: n8n
    volumes:
      - n8n-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ── n8n main (handles webhooks; offloads execution to workers) ───────────────
  n8n:
    image: n8nio/n8n:1.123.61
    depends_on:
      redis: { condition: service_healthy }
      n8n-db: { condition: service_healthy }
    environment:
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-db
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: n8n
      DB_POSTGRESDB_DATABASE: n8n
      N8N_PORT: 5678
      N8N_ENCRYPTION_KEY: loadtest-not-a-secret
      # Throughput knobs worth sweeping when you measure:
      N8N_CONCURRENCY_PRODUCTION_LIMIT: 20
      # Resolves the imported workflow's {{ $env.OPENPROJECT_INSTANCE_URL }} expression —
      # in-network hostname, not the host-mapped localhost:8080 below. NOT yet verified
      # against this exact n8n version whether $env access needs an additional opt-in
      # (recent n8n releases have gated it) — if the imported workflow's HTTP Request
      # nodes come back with an unresolved/empty URL, that's the first thing to check.
      OPENPROJECT_INSTANCE_URL: http://openproject:80
    # Bind to loopback only: this rig runs with fixed non-secret credentials, so it must never be
    # reachable from the LAN when brought up on a shared/cloud host. The harness hits localhost.
    ports:
      - "127.0.0.1:5678:5678"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5678/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── n8n worker(s) — the horizontal scale unit (--scale n8n-worker=N) ─────────
  n8n-worker:
    image: n8nio/n8n:1.123.61
    command: ["worker"]
    depends_on:
      n8n: { condition: service_healthy }
    environment:
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-db
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: n8n
      DB_POSTGRESDB_DATABASE: n8n
      N8N_ENCRYPTION_KEY: loadtest-not-a-secret
      # In queue mode the WORKER executes nodes (main only receives the webhook and
      # enqueues), so $env expressions resolve here, not on `n8n` above — must match.
      OPENPROJECT_INSTANCE_URL: http://openproject:80

  # ── A real backend to measure against (system of record) ─────────────────────
  openproject:
    image: openproject/openproject:14
    environment:
      OPENPROJECT_HOST__NAME: localhost:8080
      OPENPROJECT_SECRET_KEY_BASE: loadtest-not-a-secret
      OPENPROJECT_HTTPS: "false"
    volumes:
      - openproject:/var/openproject/assets
    ports:
      - "127.0.0.1:8080:80"

  # ── The OmniProject gateway under test (stateless; points at n8n) ────────────
  gateway:
    build:
      context: .
    image: omniproject-shell:0.2.0
    depends_on:
      n8n: { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: 5000
      SESSION_SECRET: loadtest-not-a-secret-change-me
      # The broker hop under measurement (current env name; never N8N_WEBHOOK_URL):
      BROKER_URL: http://n8n:5678/webhook/omniproject
      # For horizontal gateway→n8n scale you can instead set a pool:
      #   BROKER_URLS: http://n8n:5678/webhook/omniproject
      RATE_LIMIT_DISABLED: "true"   # measure the gateway, not the limiter
    ports:
      - "127.0.0.1:5000:5000"
    # So the rig can be brought up with `--wait` and the harness only starts once the
    # gateway is actually serving (liveness is dependency-free on the broker).
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  n8n-db:
  openproject:
