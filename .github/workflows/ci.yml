name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      # Keep this pnpm/Node pair in sync with the Dockerfile's builder stage — it deliberately
      # mirrors these exact versions, and bumping one without the other risks a silent drift
      # between what CI verifies and what actually ships.
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        # --ignore-scripts: the CI build path (esbuild, rollup, vite, tsx) uses
        # prebuilt platform binaries, not postinstall scripts, so we skip them.
        # This also avoids pnpm 11's fatal ERR_PNPM_IGNORED_BUILDS in CI without
        # weakening the workspace's supply-chain allowlist.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck (libs + apps + scripts)
        run: pnpm run typecheck

      - name: Unit tests + coverage gate (gateway)
        run: pnpm --filter @workspace/api-server run test:coverage

      - name: Unit tests + coverage gate (SPA)
        run: pnpm --filter @workspace/omniproject run test:coverage

      - name: Unit tests (tooling — setup wizard, deploy generators)
        run: pnpm --filter @workspace/scripts run test

      - name: Unit tests (backend catalogue — field/view/vendor registries)
        run: pnpm --filter @workspace/backend-catalogue run test

      - name: Unit tests (api client — hand-written fetch wrapper)
        run: pnpm --filter @workspace/api-client-react run test

      - name: Verify codegen is in sync with the OpenAPI contract
        run: |
          pnpm --filter @workspace/api-spec run codegen
          if ! git diff --quiet -- lib/api-zod lib/api-client-react; then
            echo "::error::Generated client is out of date. Run 'pnpm --filter @workspace/api-spec run codegen' and commit the result."
            git --no-pager diff --stat -- lib/api-zod lib/api-client-react
            exit 1
          fi

      - name: Verify the published broker contract is in sync with the types
        run: |
          pnpm --filter @workspace/scripts run gen-contract
          if ! git diff --quiet -- docs/CONTRACT.md docs/contract artifacts/api-server/src/broker/contract.schema.generated.ts; then
            echo "::error::Broker contract is out of date. Run 'pnpm --filter @workspace/scripts run gen-contract' and commit the result."
            git --no-pager diff --stat -- docs/CONTRACT.md docs/contract artifacts/api-server/src/broker/contract.schema.generated.ts
            exit 1
          fi

      - name: Verify the served OpenAPI bundle is in sync with the spec
        run: |
          pnpm --filter @workspace/scripts run gen-openapi
          if ! git diff --quiet -- artifacts/api-server/src/lib/openapi.generated.ts; then
            echo "::error::Served OpenAPI bundle is out of date. Run 'pnpm --filter @workspace/scripts run gen-openapi' and commit the result."
            git --no-pager diff --stat -- artifacts/api-server/src/lib/openapi.generated.ts
            exit 1
          fi

      - name: Verify the vendor catalogue is in sync with the vendor JSON
        run: |
          pnpm --filter @workspace/scripts run gen-vendors
          if ! git diff --quiet -- lib/backend-catalogue/src/vendors.generated.ts lib/backend-catalogue/src/vendor-schemas.generated.ts; then
            echo "::error::Vendor catalogue is out of date. Run 'pnpm --filter @workspace/scripts run gen-vendors' and commit the result."
            git --no-pager diff --stat -- lib/backend-catalogue/src/vendors.generated.ts lib/backend-catalogue/src/vendor-schemas.generated.ts
            exit 1
          fi

      - name: Verify the n8n example blueprints are in sync with the generator + vendor JSON
        run: |
          pnpm --filter @workspace/scripts run gen-workflow-blueprints
          if ! git diff --quiet -- artifacts/n8n-blueprints/generated; then
            echo "::error::n8n example blueprints are out of date. Run 'pnpm --filter @workspace/scripts run gen-n8n-blueprints' and commit the result."
            git --no-pager diff --stat -- artifacts/n8n-blueprints/generated
            exit 1
          fi

      - name: Verify the view catalogue is in sync with the view JSON
        run: |
          pnpm --filter @workspace/scripts run gen-views
          if ! git diff --quiet -- lib/backend-catalogue/src/views.generated.ts; then
            echo "::error::View catalogue is out of date. Run 'pnpm --filter @workspace/scripts run gen-views' and commit the result."
            git --no-pager diff --stat -- lib/backend-catalogue/src/views.generated.ts
            exit 1
          fi

      - name: Verify the notification-route catalogue is in sync with the route JSON
        run: |
          pnpm --filter @workspace/scripts run gen-notification-routes
          if ! git diff --quiet -- lib/backend-catalogue/src/notification-routes.generated.ts; then
            echo "::error::Notification-route catalogue is out of date. Run 'pnpm --filter @workspace/scripts run gen-notification-routes' and commit the result."
            git --no-pager diff --stat -- lib/backend-catalogue/src/notification-routes.generated.ts
            exit 1
          fi

      - name: Verify the field vocabulary is in sync with the field JSON
        run: |
          pnpm --filter @workspace/scripts run gen-fields
          if ! git diff --quiet -- lib/backend-catalogue/src/fields.generated.ts; then
            echo "::error::Field vocabulary is out of date. Run 'pnpm --filter @workspace/scripts run gen-fields' and commit the result."
            git --no-pager diff --stat -- lib/backend-catalogue/src/fields.generated.ts
            exit 1
          fi

      - name: Enforce every backend's field set is a subset of the superset
        run: pnpm --filter @workspace/scripts run guard-superset

      - name: Verify the report + screen catalogues are in sync with their JSON
        run: |
          pnpm --filter @workspace/scripts run gen-reports
          pnpm --filter @workspace/scripts run gen-screens
          if ! git diff --quiet -- lib/backend-catalogue/src/reports.generated.ts lib/backend-catalogue/src/screens.generated.ts; then
            echo "::error::Report/screen catalogue is out of date. Run 'pnpm --filter @workspace/scripts run gen-reports gen-screens' and commit the result."
            git --no-pager diff --stat -- lib/backend-catalogue/src/reports.generated.ts lib/backend-catalogue/src/screens.generated.ts
            exit 1
          fi

      - name: Verify the widget catalogue is in sync with its JSON
        run: |
          pnpm --filter @workspace/scripts run gen-widgets
          if ! git diff --quiet -- lib/backend-catalogue/src/widgets.generated.ts; then
            echo "::error::Widget catalogue is out of date. Run 'pnpm --filter @workspace/scripts run gen-widgets' and commit the result."
            git --no-pager diff --stat -- lib/backend-catalogue/src/widgets.generated.ts
            exit 1
          fi

      - name: Verify the dashboard-preset catalogue is in sync with its JSON
        run: |
          pnpm --filter @workspace/scripts run gen-dashboard-presets
          if ! git diff --quiet -- lib/backend-catalogue/src/dashboard-presets.generated.ts; then
            echo "::error::Dashboard-preset catalogue is out of date. Run 'pnpm --filter @workspace/scripts run gen-dashboard-presets' and commit the result."
            git --no-pager diff --stat -- lib/backend-catalogue/src/dashboard-presets.generated.ts
            exit 1
          fi

      - name: Verify the methodology catalogue is in sync with its JSON
        run: |
          pnpm --filter @workspace/scripts run gen-methodologies
          if ! git diff --quiet -- lib/backend-catalogue/src/methodologies.generated.ts; then
            echo "::error::Methodology catalogue is out of date. Run 'pnpm --filter @workspace/scripts run gen-methodologies' and commit the result."
            git --no-pager diff --stat -- lib/backend-catalogue/src/methodologies.generated.ts
            exit 1
          fi

      - name: Verify the persona catalogue is in sync with its JSON
        run: |
          pnpm --filter @workspace/scripts run gen-personas
          if ! git diff --quiet -- lib/backend-catalogue/src/personas.generated.ts; then
            echo "::error::Persona catalogue is out of date. Run 'pnpm --filter @workspace/scripts run gen-personas' and commit the result."
            git --no-pager diff --stat -- lib/backend-catalogue/src/personas.generated.ts
            exit 1
          fi

      - name: Verify the methodology reference-ruleset catalogue is in sync with its JSON
        run: |
          pnpm --filter @workspace/scripts run gen-methodology-rulesets
          if ! git diff --quiet -- lib/backend-catalogue/src/methodology-rulesets.generated.ts; then
            echo "::error::Methodology reference-ruleset catalogue is out of date. Run 'pnpm --filter @workspace/scripts run gen-methodology-rulesets' and commit the result."
            git --no-pager diff --stat -- lib/backend-catalogue/src/methodology-rulesets.generated.ts
            exit 1
          fi

      - name: Verify the function map is in sync with the code comments
        run: |
          pnpm --filter @workspace/scripts run gen-function-map
          if ! git diff --quiet -- docs/FUNCTION-MAP.md; then
            echo "::error::Function map is out of date. Run 'pnpm --filter @workspace/scripts run gen-function-map' and commit the result."
            git --no-pager diff --stat -- docs/FUNCTION-MAP.md
            exit 1
          fi

      - name: Verify a concrete broker adapter is imported only via the seam
        run: pnpm --filter @workspace/scripts run guard-broker-isolation

      - name: Verify every clickable affordance is keyboard-operable (parity guard)
        run: pnpm --filter @workspace/scripts run guard-interactive

      - name: Verify every App.tsx route has an e2e smoke (route-coverage guard)
        run: pnpm --filter @workspace/scripts run guard-e2e-routes

      - name: Verify every declared report is built, wired and tested (report-coverage guard)
        run: pnpm --filter @workspace/scripts run guard-report-coverage

      - name: Verify every declared dashboard widget has a registered renderer (widget-coverage guard)
        run: pnpm --filter @workspace/scripts run guard-widget-coverage

      - name: Verify every dashboard preset references only real widgets (preset-coverage guard)
        run: pnpm --filter @workspace/scripts run guard-dashboard-preset-coverage

      - name: Audit i18n translation-key coverage across operating languages (warn-only until complete)
        run: pnpm --filter @workspace/scripts run guard-i18n-coverage

      - name: Verify compose deployment-safety invariants (compose guard)
        run: pnpm --filter @workspace/scripts run guard-compose

      - name: Verify no persistence layer is imported above the south seam (zero-at-rest guard)
        run: pnpm --filter @workspace/scripts run guard-zero-at-rest-above-seam

      - name: Build gateway
        run: pnpm --filter @workspace/api-server run build

      - name: Build SPA
        env:
          PORT: "3000"
          BASE_PATH: "/"
        run: pnpm --filter omniproject run build

      - name: n8n contract verification (bidirectional)
        env:
          NOTIFY_INGEST_SECRET: omni-verify-secret
          # Opt in the default-off (cost) feature modules so the contract check exercises the full
          # API surface (odata / BI feeds / metrics / presence) rather than skipping them as gated-off.
          ENABLED_FEATURES: odata,integrations,presence
        run: |
          PORT=5000 node artifacts/api-server/dist/index.mjs &
          SERVER_PID=$!
          # Wait for the gateway health endpoint.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:5000/api/healthz >/dev/null 2>&1; then break; fi
            sleep 1
          done
          OMNI_API_BASE=http://localhost:5000 pnpm --filter @workspace/scripts run verify-broker
          STATUS=$?
          kill $SERVER_PID 2>/dev/null || true
          exit $STATUS

      - name: E2E smoke + stress (200 projects, 2000 users)
        env:
          STATIC_DIR: artifacts/omniproject/dist/public
          DEMO_SCALE_PROJECTS: "200"
          RATE_LIMIT_DISABLED: "true"
          NOTIFY_INGEST_SECRET: omni-verify-secret
        run: |
          PORT=5050 STATIC_DIR=$STATIC_DIR DEMO_SCALE_PROJECTS=$DEMO_SCALE_PROJECTS RATE_LIMIT_DISABLED=$RATE_LIMIT_DISABLED \
            node artifacts/api-server/dist/index.mjs &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:5050/api/healthz >/dev/null 2>&1; then break; fi
            sleep 1
          done
          set +e
          OMNI_API_BASE=http://localhost:5050 pnpm --filter @workspace/scripts run e2e-smoke
          E2E=$?
          OMNI_API_BASE=http://localhost:5050 STRESS_USERS=2000 pnpm --filter @workspace/scripts run stress
          STRESS=$?
          kill $SERVER_PID 2>/dev/null || true
          [ $E2E -eq 0 ] && [ $STRESS -eq 0 ]

      - name: Backend mapping certification (live, env-gated; skips without creds)
        run: pnpm --filter @workspace/scripts run integration:openproject

  # Validate the deploy artifacts so they can't silently drift (the naming-drift
  # guard lives in the gateway unit tests above; this catches syntax/interpolation
  # and k8s schema breakage). Runs in parallel — needs no pnpm/build.
  deploy-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Validate compose files (syntax + interpolation)
        # Dummy values satisfy the ${VAR:?} fail-fast required-vars so the parse
        # doesn't abort. Exported in the shell, so no .env "$$" escaping applies.
        env:
          SESSION_SECRET: ci-dummy
          OIDC_CLIENT_ID: ci-dummy
          OIDC_CLIENT_SECRET: ci-dummy
          OIDC_ISSUER_URL: https://idp.example.com
          PUBLIC_URL: https://omni.example.com
          AUTHENTIK_PG_PASSWORD: ci-dummy
          AUTHENTIK_SECRET_KEY: ci-dummy-ci-dummy-ci-dummy-ci-dummy
          TRAEFIK_DASHBOARD_AUTH: admin:dummy
        run: |
          docker compose -f docker-compose.standalone.yml config -q
          docker compose -f docker-compose.enterprise.yml config -q
          docker compose -f docker-compose.slim.yml config -q
          docker compose -f docker-compose.loadtest.yml config -q
          # The dev override must compose cleanly ON TOP of the standalone base.
          docker compose -f docker-compose.standalone.yml -f docker-compose.dev.yml config -q

      - name: Lint k8s manifest (kubeconform)
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar xz kubeconform
          ./kubeconform -strict -ignore-missing-schemas -summary k8s-enterprise-manifest.yaml

  # Accessibility: axe-core (WCAG 2.1 A/AA) over the built SPA in a real browser.
  # Playwright + axe-core are installed into a throwaway dir (not the workspace
  # lockfile) and resolved via NODE_PATH, matching scripts/a11y-scan.cjs.
  accessibility:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build gateway + SPA
        env:
          PORT: "3000"
          BASE_PATH: "/"
        run: |
          pnpm --filter @workspace/api-server run build
          pnpm --filter omniproject run build

      - name: Install browser tooling (throwaway, off-lockfile)
        run: |
          mkdir -p /tmp/a11y
          cd /tmp/a11y && npm init -y >/dev/null && npm i playwright axe-core
          ./node_modules/.bin/playwright install --with-deps chromium

      - name: Scan
        run: |
          STATIC_DIR="$PWD/artifacts/omniproject/dist/public" PORT=5055 \
            node artifacts/api-server/dist/index.mjs &
          for _ in $(seq 1 30); do curl -fsS http://localhost:5055/api/healthz >/dev/null 2>&1 && break; sleep 1; done
          NODE_PATH=/tmp/a11y/node_modules A11Y_BASE=http://localhost:5055 \
            pnpm --filter @workspace/scripts run a11y

  # Build the single-container "omni-shell" image and smoke-boot it. `verify`
  # builds the app with pnpm, but nothing here ever built the *Docker image* — so
  # Dockerfile rot (Node base dropping corepack, pnpm version drift, a broken
  # static-copy path) could ship undetected. This job is that guard: it fails if
  # the image can't build, can't boot, or doesn't serve both the API and the SPA.
  docker-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Build the omni-shell image
        run: docker build -t omni-shell:ci .

      - name: Smoke-boot in demo mode (API health + served SPA root)
        run: |
          # ACCEPT_DEMO_AUTH=1: the boot-time security self-check refuses to start with
          # OIDC unset (demo-auth-in-prod) unless this is set — this smoke test IS demo mode.
          docker run -d --name omni -p 3000:3000 \
            -e SESSION_SECRET=ci-smoke-secret-not-for-prod \
            -e ACCEPT_DEMO_AUTH=1 \
            omni-shell:ci
          for _ in $(seq 1 30); do
            curl -fsS http://localhost:3000/api/healthz >/dev/null 2>&1 && break
            sleep 2
          done
          # Both must respond: the API health endpoint, and the static SPA root
          # (a 200 here proves the built frontend actually landed in the image).
          curl -fsS http://localhost:3000/api/healthz
          test "$(curl -fsS -o /dev/null -w '%{http_code}' http://localhost:3000/)" = "200"

      - name: Container logs (always)
        if: always()
        run: docker logs omni || true

      - name: Teardown
        if: always()
        run: docker rm -f omni || true

  # Supply-chain hygiene: fail on a CRITICAL advisory, surface the rest, and emit
  # a dependency/licence SBOM inventory artefact. Pre-community we gate only on
  # critical (lower severities are reported, not blocking) — tighten when shipping.
  dependency-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Audit (block on critical)
        run: pnpm audit --audit-level critical

      - name: Report all advisories (non-blocking)
        if: always()
        run: pnpm audit || true

      - name: Generate dependency + licence SBOM inventory
        if: always()
        run: pnpm licenses list --json > sbom-licences.json

      # A full CycloneDX component SBOM (versions + hashes) for vulnerability correlation and the
      # supply-chain evidence enterprises increasingly require (US EO 14028). Syft reads the
      # pnpm lockfile directly; the action uploads it as a build artefact.
      - name: Generate CycloneDX component SBOM (Syft)
        if: always()
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: sbom-cyclonedx.json

      - name: Upload licence SBOM
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom-licences
          path: sbom-licences.json

  # Secret scanning: fail on a real-looking credential anywhere in the checked-out source.
  # .gitleaks.toml allowlists exactly one known-fake test fixture (a PEM block whose body
  # decodes to the literal word "fake") — see that file for why it's provably not a secret.
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz gitleaks
      - name: Scan for secrets (gitleaks)
        run: ./gitleaks detect --source . --no-git --config .gitleaks.toml -v

  # Acceptance (end-to-end) — drives the real built SPA in Chromium against the gateway in demo
  # mode. Separate from `verify` so its browser download + build never slows the fast lane.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Build + run acceptance specs (mouse + keyboard journeys)
        run: pnpm run e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  # Standalone retention-broker service (services/retention-broker) — NOT part of the pnpm workspace,
  # so it has its own npm install + node:test. Isolated here so its cloud SDKs never touch the
  # monorepo's install or supply-chain guard. Offline: the SDK clients are faked in the tests.
  retention-broker:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: services/retention-broker
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
      - name: Install (isolated npm)
        # Strict lockfile install only — no `|| npm install` fallback (that fails open on lockfile
        # drift, defeating integrity for the cloud-credentialed broker package).
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test (offline; SDK clients faked)
        run: npm test
