openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: >-
    OmniProject API — the stable, broker-agnostic consumer (northbound) API. It
    surfaces projects, issues, programmes, reports and admin operations above the
    swappable broker seam, so it stays the same regardless of which broker reaches your backends. The southbound broker contract a broker must
    implement is published separately at GET /api/contract.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: proxy
    description: Broker-agnostic gateway edge
  - name: projects
    description: Project and issue management above the broker seam
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /broker/command:
    post:
      operationId: brokerCommand
      tags: [proxy]
      summary: Forward a generic action to the broker
      description: >-
        Packages a user action with the OIDC token and forwards it to the active
        broker (the command-palette passthrough). Requires the contributor role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrokerCommandInput"
      responses:
        "200":
          description: Broker response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerCommandResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Broker error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /fx-rates:
    get:
      operationId: getFxRates
      tags: [projects]
      summary: Multi-currency FX rates
      description: >-
        Read-through FX rates for multi-currency portfolio comparison, sourced
        from the backend/ERP via the broker. Demo mode and live-read failures
        serve indicative sample rates (provenance "sample").
      parameters:
        - name: asOf
          in: query
          required: false
          description: >-
            ISO 8601 date to read the rate as of, implementing the FX
            as-of-date policy (period-close / budget rate) for consolidated
            reports. A broker that can't serve a historical rate degrades to
            its current live snapshot; always read live, never cached.
          schema:
            type: string
      responses:
        "200":
          description: FX rate table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FxRates"
        "502":
          description: Broker error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /history/replay:
    get:
      operationId: replayHistory
      tags: [projects]
      summary: Time-travel — replay recorded portfolio states
      description: >-
        Reads recorded portfolio states back from the operator's logging server
        via the broker. Returns 409 unless the operator opted into the
        logging-server egress (otherwise there is no recorded history).
      parameters:
        - name: from
          in: query
          required: false
          schema: { type: string }
          description: ISO 8601 lower bound (inclusive).
        - name: to
          in: query
          required: false
          schema: { type: string }
          description: ISO 8601 upper bound (inclusive).
      responses:
        "200":
          description: Recorded portfolio states over time
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryState"
        "409":
          description: Time-travel not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Broker error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      description: Fetches normalized project list via the broker
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project (brokered to the backend; manager+)
      description: >-
        Creates a project in the backend system of record via the broker. Only
        available when the backend can store projects
        (capabilities.entities.project.store). Setting programmeId here is how a
        project joins a programme.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid input
        "403":
          description: Not permitted, or the backend can't store projects

  /projects/{projectId}:
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project — including programme grouping (manager+)
      description: >-
        Updates project fields via the broker. Setting/clearing programmeId is the
        derived-programme grouping mechanism. Available only when the backend can
        store the affected entity.
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid input
        "403":
          description: Not permitted
        "404":
          description: No such project

  /programmes:
    get:
      operationId: listProgrammes
      tags: [projects]
      summary: List programmes (derived from project membership)
      description: >-
        Programmes are derived by grouping projects on programmeId, with rolled-up
        stats. A programme always contains at least one project; projects without
        a programmeId are standalone and excluded here.
      responses:
        "200":
          description: Programmes with roll-up stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Programme"

  /programmes/{programmeId}:
    get:
      operationId: getProgramme
      tags: [projects]
      summary: A programme with its member projects (programme-wide view)
      parameters:
        - name: programmeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Programme detail + member projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgrammeDetail"
        "404":
          description: No such programme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/issues:
    get:
      operationId: getProjectIssues
      tags: [projects]
      summary: List issues for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of issues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Issue"
    post:
      operationId: createIssue
      tags: [projects]
      summary: Create a new issue
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueInput"
      responses:
        "201":
          description: Created issue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"

  /projects/{projectId}/issues/{issueId}:
    patch:
      operationId: updateIssue
      tags: [projects]
      summary: Update an issue
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueUpdate"
      responses:
        "200":
          description: Updated issue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "409":
          description: >-
            Optimistic-concurrency conflict — the issue changed since it was read
            (expectedVersion no longer matches). The current server state is
            returned so the client can rebase and retry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictResponse"
    delete:
      operationId: deleteIssue
      tags: [projects]
      summary: Delete an issue
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /resources:
    get:
      operationId: listResourcePool
      tags: [projects]
      summary: Portfolio-wide people with skills & capacity (resource planning)
      description: >-
        Aggregates project members across the portfolio into one resource pool —
        skills (union) and capacity (summed) per person — for live and what-if
        resource planning. Available when the backend surfaces members and
        resource data (capabilities.entities.member + resources).
      responses:
        "200":
          description: Aggregated resource pool
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResourceMember"

  /projects/{projectId}/members:
    get:
      operationId: listProjectMembers
      tags: [projects]
      summary: People on a project, with their access level
      description: >-
        Backend-owned project membership; drives the assignee picker (only
        write-access people can be assigned). Available when the backend can
        surface members (capabilities.entities.member).
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"

  /projects/{projectId}/issues/{issueId}/items:
    get:
      operationId: listTaskItems
      tags: [projects]
      summary: List a task's child issues & notes
      description: >-
        The 0..many issues/notes raised against a task. Only meaningful when the
        backend can store them (capabilities.entities.issue / .note).
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task child items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskItem"
    post:
      operationId: createTaskItem
      tags: [projects]
      summary: Raise an issue or add a note against a task (contributor+)
      description: >-
        Creates a child issue/note on a task via the broker. Gated on the backend
        being able to store that kind (entities.issue.store / entities.note.store).
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskItem"
        "400":
          description: Invalid input
        "403":
          description: Not permitted, or the backend can't store this kind

  /projects/{projectId}/summary:
    get:
      operationId: getProjectSummary
      tags: [projects]
      summary: Get project summary stats
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"

  /projects/{projectId}/capacity:
    get:
      operationId: getProjectCapacity
      tags: [projects]
      summary: Resource capacity & workload allocation for a project
      description: "Routed to the broker with X-OmniProject-Action: get_resource_capacity, X-OmniProject-Source: capacity_engine"
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resource capacity rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResourceCapacity"

  /projects/{projectId}/financials:
    get:
      operationId: getProjectFinancials
      tags: [projects]
      summary: Earned Value Management (EVM) financials for a project
      description: "Routed to the broker with X-OmniProject-Action: get_project_financials, X-OmniProject-Source: financial_ledger"
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project financials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFinancials"

  /projects/{projectId}/history:
    get:
      operationId: getProjectHistory
      tags: [projects]
      summary: Time-phased progress history for a project
      description: >-
        Trend of completion / scope over time. Sourced from the underlying system
        of record (e.g. OpenProject journals/activity) via the broker
        (X-OmniProject-Action: get_project_history, X-OmniProject-Source:
        history_provider). OmniProject stores nothing itself — it is a stateless
        overlay, so the backend remains authoritative for history.
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ordered history points (oldest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectHistoryPoint"

  /projects/{projectId}/baseline:
    get:
      operationId: getProjectBaseline
      tags: [projects]
      summary: Approved schedule/scope baseline for a project
      description: >-
        The approved baseline held in the system of record (e.g. an OpenProject
        baseline), surfaced via the broker (X-OmniProject-Action: get_baseline,
        X-OmniProject-Source: baseline_store). Returns null when the backend has
        no baseline captured. OmniProject never writes its own baseline store.
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Baseline, or null when none is held by the backend
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ProjectBaseline"
                  - type: "null"

  /projects/{projectId}/raid:
    get:
      operationId: getProjectRaid
      tags: [projects]
      summary: RAID log (Risks, Assumptions, Issues, Dependencies) for a project
      description: "Routed to the broker with X-OmniProject-Action: get_raid, X-OmniProject-Source: raid_register"
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: RAID entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RaidEntry"
    post:
      operationId: createRaidEntry
      tags: [projects]
      summary: Add a RAID entry (written to the system of record via the broker)
      description: "Routed to the broker with X-OmniProject-Action: create_raid_entry, X-OmniProject-Source: raid_register. Requires a contributor role or higher."
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RaidEntryInput"
      responses:
        "201":
          description: Created RAID entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RaidEntry"

  /notifications:
    get:
      operationId: listNotifications
      tags: [projects]
      summary: Notifications for the current user
      description: "Routed to the broker with X-OmniProject-Action: get_notifications, X-OmniProject-Source: notification_center"
      responses:
        "200":
          description: Notification entries (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /portfolio/health:
    get:
      operationId: getPortfolioHealth
      tags: [projects]
      summary: Portfolio-wide multi-project health aggregation
      description: "Routed to the broker with X-OmniProject-Action: get_portfolio_health, X-OmniProject-Source: portfolio_master"
      responses:
        "200":
          description: Portfolio health summary rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioHealthSummary"

  /portfolio/summary:
    get:
      operationId: getPortfolioSummary
      tags: [projects]
      summary: This instance's own pre-aggregated portfolio totals (backlog #135 federation)
      description: >-
        Portfolio-wide totals only (RAG counts + variance/blocker averages, a consolidated finance
        total, a consolidated capacity total) — never per-project or per-programme detail. This is
        the ONE endpoint a federated peer instance calls (see FEDERATED_PEERS / settings.federatedPeers
        and docs/DATA-RESIDENCY.md): a bearer token that is one of this instance's own API_TOKENS
        grants read-only access, exactly like any other read-only API-token consumer.
      responses:
        "200":
          description: Portfolio-wide aggregate totals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSummary"

  /federated-portfolio:
    get:
      operationId: getFederatedPortfolio
      tags: [projects]
      summary: This instance's portfolio summary merged with every configured peer's (backlog #135)
      description: >-
        Fans out live to every ACTIVE peer in settings.federatedPeers (GET their own /portfolio/summary
        with the configured bearer token) and returns this instance's own summary alongside each peer's,
        clearly labeled by peer id/label/region — never blended into one number. An unreachable or
        misconfigured peer degrades to a labeled "unavailable" contribution instead of failing the
        whole view. Nothing is cached; every call re-fans-out.
      responses:
        "200":
          description: The combined federated portfolio view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FederatedPortfolio"

  /activity:
    get:
      operationId: listActivity
      tags: [projects]
      summary: Recent activity feed across all projects
      responses:
        "200":
          description: Activity entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

  /capabilities:
    get:
      operationId: getCapabilities
      tags: [proxy]
      summary: Which data domains the wired backend(s) can populate
      description: >-
        Sourced from the broker (action get_capabilities, source capability_probe) so the
        UI can pre-emptively label which reports/views are available. Falls back to
        the CAPABILITIES env override, or demo defaults.
      responses:
        "200":
          description: Capability flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capabilities"

  /admin/broker-log:
    get:
      operationId: getBrokerLog
      tags: [proxy]
      summary: Recent brokered actions (admin-only live log)
      description: >-
        A bounded, in-memory ring of the most recent gateway → broker → backend
        actions (action, result, status, latency, actor), so an admin can watch
        traffic and surface failures live. Pair with the SSE stream at
        /admin/broker-log/stream for live tailing. Requires the admin role.
      responses:
        "200":
          description: The current broker-log ring (oldest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrokerLogEntry"

  /fields/manifest:
    get:
      operationId: getFieldManifest
      tags: [proxy]
      summary: Per-backend field manifest (the describe → reconcile path)
      description: >-
        Enumerates the fields the active backend exposes and reconciles them
        against the canonical registry (known / unknown / missing), flagging
        relationship candidates among the unknowns. Powers the admin translation
        layer's "what does this backend expose, what's unmapped" view. Requires
        the manager role (it reveals backend schema detail).
      responses:
        "200":
          description: The reconciled field manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldManifest"

  /settings:
    get:
      operationId: getSettings
      tags: [proxy]
      summary: Get integration settings
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [proxy]
      summary: Update integration settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    HistoryState:
      type: object
      description: >-
        A portfolio-level state at a point in time (time-travel replay).
        provenance "replayed" = a real recorded state; "projected" = a model of
        the future, never fact; "sample" = demo.
      properties:
        at:
          type: string
          description: ISO 8601 timestamp of this recorded state.
        completionPct:
          type: number
        openBlockers:
          type: ["integer", "null"]
        provenance:
          type: string
          enum: [replayed, projected, sourced, derived, sample]
      required:
        - at
        - completionPct
        - provenance

    FxRates:
      type: object
      description: Base-anchored FX rate table for multi-currency conversion.
      properties:
        base:
          type: string
          description: ISO 4217 code the rates are anchored to (e.g. "GBP").
        rates:
          type: object
          additionalProperties:
            type: number
          description: Map of ISO 4217 code → rate relative to base.
        provenance:
          type: string
          enum: [sourced, sample]
          description: '"sourced" = from the backend/ERP; "sample" = indicative fallback.'
        asOf:
          type: string
          description: ISO 8601 timestamp the rates were captured.
      required:
        - base
        - rates
        - provenance
        - asOf

    BrokerCommandInput:
      type: object
      properties:
        action:
          type: string
          description: Action name (e.g. "create_ticket", "update_status")
        payload:
          type: object
          additionalProperties: true
        source:
          type: string
          description: Backend routing hint (free-form; e.g. "all", "jira", "plane")
        idempotencyKey:
          type: string
          description: >-
            Deterministic dedupe key the gateway appends (also sent as the
            X-OmniProject-Idempotency-Key header) so the broker can drop
            duplicate triggers within the same minute.
        origin:
          type: string
          description: System initiating the action (defaults to "omniproject").
      required:
        - action
        - payload

    BrokerCommandResult:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          additionalProperties: true
        message:
          type: ["string", "null"]
      required:
        - success

    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        identifier:
          type: string
        description:
          type: ["string", "null"]
        source:
          type: string
          description: plane or openproject
        programmeId:
          type: ["string", "null"]
          description: >-
            Optional programme this project belongs to (owned by the backend). A
            project with no programmeId is standalone; OmniProject derives the
            programme grouping from this field, so a programme exists only when at
            least one project references it.
        programmeName:
          type: ["string", "null"]
        issueCount:
          type: integer
        completedCount:
          type: integer
        memberCount:
          type: integer
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - identifier
        - source
        - issueCount
        - completedCount
        - memberCount
        - updatedAt

    ProjectInput:
      type: object
      description: Fields to create a project (brokered to the backend).
      properties:
        name:
          type: string
        identifier:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        programmeId:
          type: ["string", "null"]
          description: Optional programme to join on creation.
      required:
        - name

    ProjectUpdate:
      type: object
      description: Project fields to update (all optional). programmeId groups it.
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        programmeId:
          type: ["string", "null"]

    ProgrammeFinancials:
      type: object
      description: >
        Programme-wide financial roll-up, summed from member projects' financial
        fields (native currency; the client converts for display). Present only
        when the backend supplies financial data.
      properties:
        currency:
          type: string
        budget:
          type: number
        actualCost:
          type: number
        earnedValue:
          type: ["number", "null"]
        committed:
          type: ["number", "null"]
        cpi:
          type: ["number", "null"]
        variance:
          type: number
        variancePct:
          type: ["number", "null"]
        health:
          type: string
          enum: [GREEN, AMBER, RED]
        projectsCounted:
          type: integer
        reporting:
          type: object
          description: >-
            Per-metric reporting coverage, so the UI can show "12 of 15 reporting"
            inline instead of silently hiding a partially-reported metric.
          properties:
            total:
              type: integer
              description: All member projects (denominator for portfolio coverage).
            costed:
              type: integer
              description: Projects carrying any financials (= projectsCounted).
            earnedValue:
              type: integer
              description: Of the costed projects, how many reported earned value.
            committed:
              type: integer
              description: Of the costed projects, how many reported committed/PO cost.
          required:
