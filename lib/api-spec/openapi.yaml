        likelihood:
          type: ["string", "null"]
          enum: [low, medium, high, null]
        impact:
          type: ["string", "null"]
          enum: [low, medium, high, null]
        status:
          type: string
          enum: [open, mitigating, closed]
        owner:
          type: ["string", "null"]
        mitigation:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
          format: date
        provenance:
          $ref: "#/components/schemas/Provenance"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - type
        - title
        - severity
        - status
        - createdAt
        - updatedAt

    RaidEntryInput:
      type: object
      properties:
        type:
          type: string
          enum: [risk, assumption, issue, dependency]
        title:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        severity:
          type: string
          enum: [low, medium, high, critical]
        likelihood:
          type: ["string", "null"]
          enum: [low, medium, high, null]
        impact:
          type: ["string", "null"]
          enum: [low, medium, high, null]
        status:
          type: string
          enum: [open, mitigating, closed]
        owner:
          type: ["string", "null"]
        mitigation:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
          format: date
