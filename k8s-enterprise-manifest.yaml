---
# OmniProject — Kubernetes Enterprise Manifest
# Includes: Deployments, ClusterIP Services, Ingress, ConfigMap, Secrets
# Apply with: kubectl apply -f k8s-enterprise-manifest.yaml
# Requires: kubectl, a running cluster, and an existing OIDC provider

apiVersion: v1
kind: Namespace
metadata:
  name: omniproject
  labels:
    app.kubernetes.io/part-of: omniproject

---
# ── ConfigMap: non-sensitive configuration ────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: omniproject-config
  namespace: omniproject
data:
  NODE_ENV: "production"
  PORT: "3000"
  BASE_PATH: "/"
  BROKER_URL: "http://n8n:5678/webhook/omniproject"   # 0.2.0+: was N8N_WEBHOOK_URL
  # Public origin of the shell — used to build the OIDC redirect URI.
  PUBLIC_URL: "https://app.your-domain.com"  # REPLACE
  AI_PROVIDER: "none"                         # none | ollama | openrouter | openai | anthropic
  AI_MODEL: ""                                # optional; provider default otherwise
  OLLAMA_URL: "http://ollama:11434"           # only used when AI_PROVIDER=ollama
  GENERIC_TIMEZONE: "UTC"
  N8N_PORT: "5678"

---
# ── Secret: sensitive OIDC and service credentials ───────────────────────────
# DO NOT commit real values here. This ships with EMPTY values on purpose: with
# an empty SESSION_SECRET the gateway refuses to boot in production (fail-fast),
# so there is no silently-insecure default. Create the real secret out-of-band:
#
#   kubectl -n omniproject create secret generic omniproject-secrets \
#     --from-literal=SESSION_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=OIDC_ISSUER_URL=https://your-idp/... \
#     --from-literal=OIDC_CLIENT_ID=... --from-literal=OIDC_CLIENT_SECRET=...
#
# In production prefer External Secrets Operator or Sealed Secrets over a raw
# Secret. n8n is protected by its own owner-account setup on first run.
apiVersion: v1
kind: Secret
metadata:
  name: omniproject-secrets
  namespace: omniproject
type: Opaque
stringData:
  OIDC_ISSUER_URL: ""              # REQUIRED — set out-of-band (see above)
  OIDC_CLIENT_ID: ""              # REQUIRED
  OIDC_CLIENT_SECRET: ""          # REQUIRED
  SESSION_SECRET: ""              # REQUIRED — empty => gateway refuses to start
  API_TOKENS: ""                  # read-only tokens for Power BI / exports (comma-separated)
  # AI provider API keys are NOT secrets here — they are entered in the admin UI and held
  # in the encrypted vault. Only the vault root secret is needed (else derived from
  # SESSION_SECRET). The vault file lives under OMNI_CONFIG_DIR (mount it persistently).
  VAULT_KEY: ""                   # base64 32 bytes; optional (SESSION_SECRET-derived if empty)

---
# ── OmniProject Shell — Deployment ───────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omni-shell
  namespace: omniproject
  labels:
    app: omni-shell
spec:
  # Stays at 1 by default ON PURPOSE: without a shared bus the SSE notification
  # fan-out, the global rate-limit ceiling, and the security-state converge loops
  # (AI kill-switch, key/session revocation, SCIM deprovisioning) are per-replica,
  # so >1 replica drops ~half of real-time notifications and lets each control lag
  # across the fleet. To scale out: deploy Redis and add REDIS_URL to the ConfigMap,
  # and use a Redis-enabled image built with `--build-arg WITH_REDIS=1` (no source
  # edit / bespoke rebuild — see the root Dockerfile), then add a PodDisruptionBudget
  # + topologySpreadConstraints. See docs/ops/MULTI-REPLICA.md.
  replicas: 1
  selector:
    matchLabels:
      app: omni-shell
  template:
    metadata:
      labels:
        app: omni-shell
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: omni-shell
          image: your-registry/omniproject-shell:0.2.0  # REPLACE with your image:tag (avoid :latest)
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: omniproject-config
            - secretRef:
                name: omniproject-secrets
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          # Slow IdP discovery on boot shouldn't trip liveness — gate with startup.
          startupProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            periodSeconds: 20
          # Readiness gates traffic on actual backend reachability (/api/readyz
          # returns 503 when the broker is unreachable) so the Service stops
          # routing here during a backend outage — WITHOUT restarting the pod
          # (that's liveness's job, kept on the dependency-free /api/healthz).
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: tmp
          emptyDir: {}

---
# ── OmniProject Shell — ClusterIP Service ─────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: omni-shell
  namespace: omniproject
spec:
  selector:
    app: omni-shell
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000

---
# ── n8n — Deployment ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: omniproject
  labels:
    app: n8n
spec:
  # ⚠️ SINGLE POINT OF FAILURE. This n8n runs on SQLite (DB_TYPE=sqlite) on a ReadWriteOnce
  # PVC, so it is inherently single-instance: a node/PVC failure takes the automation backend
  # down with no standby, and you CANNOT raise replicas here (a second pod can't attach the
  # RWO volume and SQLite has no shared-write story). For an HA backend, switch n8n to
  # PostgreSQL (DB_TYPE=postgresdb + DB_POSTGRESDB_* env pointing at a managed/replicated
  # Postgres), drop this PVC, and then raise replicas + add a PodDisruptionBudget. See
  # docs/ops/MULTI-REPLICA.md §6.
  replicas: 1
  # Recreate (not the default RollingUpdate): with a ReadWriteOnce PVC a rolling update would
  # try to start the new pod while the old one still holds the volume — the new pod stays
  # Pending on "volume already attached" and the rollout deadlocks. Recreate tears the old pod
  # down first. Brief downtime per deploy is the correct trade for a single-writer SQLite backend.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000          # the "node" user in the n8n image
        runAsGroup: 1000
        fsGroup: 1000            # so the non-root user can write the PVC
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: n8n
          image: n8nio/n8n:1.123.61   # pinned to the blueprint-verified version, matching the compose files (2.x exists but is unverified against the bundled blueprint)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            # n8n writes to /home/node/.n8n (PVC) and tmp — leave rootfs writable.
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 5678
          env:
            - name: N8N_PORT
              valueFrom:
                configMapKeyRef:
                  name: omniproject-config
                  key: N8N_PORT
            - name: GENERIC_TIMEZONE
              valueFrom:
                configMapKeyRef:
                  name: omniproject-config
                  key: GENERIC_TIMEZONE
            - name: DB_TYPE
              value: sqlite
            - name: WEBHOOK_URL
              value: "https://n8n.your-domain.com/"  # REPLACE
          startupProbe:
            httpGet:
              path: /healthz
              port: 5678
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-pvc

---
# ── n8n — PersistentVolumeClaim ───────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-pvc
  namespace: omniproject
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# ── n8n — ClusterIP Service ───────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: omniproject
spec:
  selector:
    app: n8n
  ports:
    - protocol: TCP
      port: 5678
      targetPort: 5678

---
# ── Ingress — routes external traffic to services ─────────────────────────────
# Requires an Ingress controller (nginx-ingress or similar) installed in cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omniproject-ingress
  namespace: omniproject
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Uncomment for cert-manager TLS:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx        # modern replacement for the deprecated kubernetes.io/ingress.class annotation
  tls:
    - hosts:
        - app.your-domain.com    # REPLACE
      secretName: omniproject-tls
  rules:
    - host: app.your-domain.com  # REPLACE
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omni-shell
                port:
                  number: 3000
    # n8n is intentionally NOT exposed via Ingress — it is the bundled data broker and
    # has only owner-account auth. Keep it ClusterIP-only (the shell reaches it at
    # http://n8n:5678). If you must expose the n8n editor, add an authenticated
    # host with an ingress auth annotation (e.g. oauth2-proxy), not a bare rule.

---
# ── NetworkPolicy: default-deny ingress for the namespace ─────────────────────
# Nothing can reach pods in this namespace unless a policy below allows it. This
# is what keeps n8n (the bundled reference broker) from being reachable by arbitrary cluster pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: omniproject
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# ── NetworkPolicy: allow the ingress controller to reach omni-shell ───────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-omni-shell
  namespace: omniproject
spec:
  podSelector:
    matchLabels:
      app: omni-shell
  policyTypes:
    - Ingress
  ingress:
    - from:
        # REPLACE the label below to match your ingress controller's namespace
        # (e.g. ingress-nginx). `kubernetes.io/metadata.name` is auto-applied by k8s.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000

---
# ── NetworkPolicy: allow ONLY omni-shell to reach n8n ─────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-omni-shell-to-n8n
  namespace: omniproject
spec:
  podSelector:
    matchLabels:
      app: n8n
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: omni-shell
      ports:
        - protocol: TCP
          port: 5678
