    Capabilities:
      type: object
      description: Data domains the wired backend(s) can populate.
      properties:
        mode:
          type: string
          description: How capabilities were resolved (broker | env | demo).
        issues:
          type: boolean
        scheduling:
          type: boolean
        resources:
          type: boolean
        financials:
          type: boolean
        portfolio:
          type: boolean
        baseline:
          type: boolean
        blockers:
          type: boolean
        history:
          type: boolean
        raid:
          type: boolean
        quality:
          type: boolean
          description: Risk & quality fields (health/RAG, impact, urgency, blocked).
        crm:
          type: boolean
          description: CRM/sales fields (deal value, probability, forecast).
        service:
          type: boolean
          description: ITSM/service fields (SLA, CSAT, change management).
        benefits:
          type: boolean
          description: >-
            Benefits-realisation fields (planned vs actual benefit value, measure,
            owner, status) — true only when a backend can carry them.
        stakeholders:
          type: boolean
          description: >-
            Stakeholder-engagement fields + entity (role, influence/interest,
            engagement, comms cadence) — true only when a backend can carry them.
        raci:
          type: boolean
          description: >-
            RACI-assignment fields + entity (deliverable → Responsible/Accountable/
            Consulted/Informed) — true only when a backend can carry them.
        timeTravel:
          type: boolean
          description: >-
            Whether historical time-travel is available — true only when the
            operator has opted in to the logging-server egress (off by default).
        residency:
          description: >-
            The active data-residency posture (see /api/security/data-residency),
            reduced to the non-sensitive bit a report needs to gate cross-border
            actions: whether enforcement is on, and the allowed region CODES (never
            URLs/secrets). Open to any authenticated user, unlike the admin status
            endpoint. Reused by the cross-programme resource-levelling view so a
            modelled cross-border move goes through the SAME gate as the broker/egress
            hop rather than a new one.
          allOf:
            - $ref: '#/components/schemas/ResidencyCapability'
        fields:
          type: object
          description: >-
            Per-field support: which work-item fields the backend can surface
            (read/display) and store (write back). Absent ⇒ derive from domains.
          additionalProperties:
            $ref: '#/components/schemas/FieldSupport'
        entities:
          type: object
          description: >-
            Per-entity support (e.g. programme, project): whether the entity can
            be surfaced and/or stored. A programme only exists when the backend
            can carry programme grouping.
          additionalProperties:
            $ref: '#/components/schemas/FieldSupport'
        customFields:
          type: array
          description: >-
            Non-canonical fields the backend's describe surfaced (the reconcile
            path): tenant/custom fields the registry doesn't model, carried
            through as gated passthrough so they light up without a registry edit.
          items:
            $ref: '#/components/schemas/DiscoveredField'
        fieldSources:
          type: object
          description: >-
            Per-field lineage: which backend system + native field each canonical
            or custom field is read from (e.g. dueDate → jira:duedate). Absent
            when the broker doesn't declare it.
          additionalProperties:
            $ref: '#/components/schemas/FieldSource'
      required:
        - mode
        - issues
        - scheduling
        - resources
        - financials
        - portfolio
        - baseline
        - blockers
        - history
        - raid
        - quality
        - crm
        - service
        - benefits
        - stakeholders
        - raci
        - timeTravel

    ResidencyCapability:
      type: object
      description: >-
        The non-sensitive slice of the data-residency posture, safe for any
        authenticated user (no endpoint URLs/secrets — see the admin-only
        /api/security/data-residency for the full status).
      properties:
        enabled:
          type: boolean
          description: Is region enforcement configured (a policy or DATA_RESIDENCY_ALLOWED)?
        allowedRegions:
          type: array
          items:
            type: string
          description: The allowed region CODES this deployment permits (e.g. ["eu"]).
      required:
        - enabled
        - allowedRegions

    FieldSupport:
      type: object
      description: Whether a field/entity can be surfaced (read) and stored (written).
      properties:
        surface:
          type: boolean
        store:
          type: boolean
      required:
        - surface
        - store

    DiscoveredField:
      type: object
      description: A field a backend's describe reported, with its metadata preserved.
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: string
        surface:
          type: boolean
        store:
          type: boolean
        references:
          type: string
        sourceSystem:
          type: string
          description: System of record this field is read from (e.g. "jira").
        sourceField:
          type: string
          description: The backend's native field name/id this field maps from.
      required:
        - key

    BrokerLogEntry:
      type: object
      description: One brokered action in the admin live log (redacted projection).
      properties:
        ts:
          type: string
        action:
          type: string
        result:
          type: string
          enum: [success, error]
        status:
          type: integer
        ms:
          type: integer
        projectId:
          type: ["string", "null"]
        actor:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
      required:
        - ts
        - action
        - result
        - status
        - ms

    FieldSource:
      type: object
      description: Where a canonical/custom field is read from (system + native field).
      properties:
        system:
          type: string
        field:
          type: string
      required:
        - system
        - field

    FieldManifest:
      type: object
      description: >-
        The per-backend field manifest — the reconcile path made inspectable.
        Diffs the backend's describe against the canonical registry.
      properties:
        mode:
          type: string
        enumerated:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveredField'
        reconciliation:
          type: object
          description: known/unknown/missing field keys vs the canonical registry.
          properties:
            known:
              type: array
              items:
                type: string
            unknown:
              type: array
              items:
                type: string
            missing:
              type: array
              items:
                type: string
          required:
            - known
            - unknown
            - missing
        customFields:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveredField'
        relationshipCandidates:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              references:
                type: string
              kind:
                type: string
            required:
              - field
              - references
              - kind
      required:
        - mode
        - enumerated
        - reconciliation
        - customFields
        - relationshipCandidates

    Settings:
      type: object
      properties:
        brokerUrl:
          type: ["string", "null"]
          description: The active broker's webhook/endpoint URL.
        aiProvider:
          type: string
          enum: [none, openai, ollama, anthropic, openrouter]
        sttProvider:
          type: string
          description: >-
            Speech-to-text engine. "browser" runs on-device (no audio egress);
            "whisper" is an AI-assisted, off-device transcription provider
            (governance-gated). "none" disables dictation server-side.
          enum: [none, browser, whisper]
        aiModel:
          type: ["string", "null"]
        backendSource:
          type: string
          description: >-
            Free-form backend routing hint passed to the broker (e.g. "all",
            "jira", "azure-devops", "servicenow", "plane", "openproject"). "all"
            means no filter — whatever the broker is wired to.
        reportingCurrency:
          type: ["string", "null"]
          description: >-
            ISO 4217 code the consolidated financial reports default to (e.g. "GBP").
            Empty/absent ⇒ the FX table's base currency is used. Display-only — amounts
            are converted at view time via the broker FX rates; nothing is re-stored.
        fxRatePolicy:
          type: string
          description: >-
            Which FX rate consolidated reports convert at: "spot" (today's live rate),
            "periodClose" (the rate as of fxRateAsOfDate, e.g. the period the books
            closed at) or "budgetRate" (the rate as of fxRateAsOfDate treated as the
            rate the budget was set at, so variance isn't polluted by FX drift). A
            broker that can't serve a historical rate degrades to its live snapshot.
          enum: [spot, periodClose, budgetRate]
        fxRateAsOfDate:
          type: ["string", "null"]
          description: >-
            ISO 8601 date the "as of" rate is read for when fxRatePolicy isn't "spot".
            Ignored (falls back to spot) when null.
        oidcIssuerUrl:
          type: ["string", "null"]
        deploymentProfile:
          type: string
          description: >-
            Deployment context chosen in the setup wizard, which relaxes enterprise
            couplings by choice (e.g. a charity/self-hosted instance on a plain-HTTP LAN).
            Optional; absent until an admin selects one. The infra-level DEPLOYMENT_PROFILE
            env var takes precedence on a fresh boot (see docs/REVERSE-PROXY.md).
          enum: [enterprise, business, nonprofit, self-hosted, demo]
        errorTelemetry:
          type: boolean
          description: >-
            Admin opt-in. When true the SPA reports uncaught render errors (message +
            component stack + page, never user/project data) to POST /client-errors, which
            records them to the gateway's INTERNAL audit log. Off by default — the same
            no-external-telemetry posture as the rest of the app.
        loggingSync:
          $ref: "#/components/schemas/LoggingSync"
        fieldOverrides:
          $ref: "#/components/schemas/FieldMapOverride"
      required:
        - aiProvider
        - backendSource

    FieldMapOverride:
      type: object
      description: >-
        Admin translation-layer overrides for the capability map. Each entry
        REPLACES that field's/entity's surface+store, correcting a mis-mapping.
      properties:
        fields:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/FieldSupport"
        entities:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/FieldSupport"

    LoggingSync:
      type: object
      description: >-
        Opt-in state-history egress to an operator-owned logging server (off by
        default). The single deliberate relaxation of OmniProject's stateless
        posture; egressed data is the operator's responsibility and outside
        OmniProject's warranty. Enabling it unlocks historical time-travel.
      properties:
        enabled:
          type: boolean
        url:
          type: ["string", "null"]
        acknowledgedWarranty:
          type: boolean
          description: The admin acknowledged egressed data is outside OmniProject's warranty.
      required:
        - enabled
        - acknowledgedWarranty

    SettingsUpdate:
      type: object
      properties:
        brokerUrl:
          type: ["string", "null"]
        aiProvider:
          type: string
          enum: [none, openai, ollama, anthropic, openrouter]
        sttProvider:
          type: string
          description: >-
            Speech-to-text engine ("none" | "browser" on-device | "whisper" AI-assisted).
          enum: [none, browser, whisper]
        aiModel:
          type: ["string", "null"]
        backendSource:
          type: string
          description: >-
            Free-form backend routing hint passed to the broker (see Settings.backendSource).
        reportingCurrency:
          type: ["string", "null"]
          description: >-
            Default ISO 4217 reporting currency for consolidated financial reports
            (see Settings.reportingCurrency). Empty/null clears it (falls back to the FX base).
        fxRatePolicy:
          type: string
          description: Set the FX as-of-date policy (see Settings.fxRatePolicy).
          enum: [spot, periodClose, budgetRate]
        fxRateAsOfDate:
          type: ["string", "null"]
          description: Set the "as of" date used when fxRatePolicy isn't "spot" (see Settings.fxRateAsOfDate).
        oidcIssuerUrl:
          type: ["string", "null"]
        deploymentProfile:
          type: string
          description: >-
            Set the deployment profile (admin). Persisted; the infra-level
            DEPLOYMENT_PROFILE env var still wins on a fresh boot (see docs/REVERSE-PROXY.md).
          enum: [enterprise, business, nonprofit, self-hosted, demo]
        errorTelemetry:
          type: boolean
          description: Admin opt-in for internal client-error reporting (see Settings.errorTelemetry).
        loggingSync:
          $ref: "#/components/schemas/LoggingSync"
        fieldOverrides:
          $ref: "#/components/schemas/FieldMapOverride"

    Provenance:
      type: string
      description: >-
        Where a figure came from, so the UI never presents a synthesised number
        as fact. "sourced" = read from the backend system of record via the broker;
        "derived" = computed by the gateway from real issue data; "sample" =
        demo/placeholder data (no backend wired).
      enum: [sourced, derived, sample]

    ConflictResponse:
      type: object
      properties:
        error:
          type: string
        current:
          $ref: "#/components/schemas/Issue"
      required:
        - error

    ProjectHistoryPoint:
      type: object
      description: One point on a project's progress trend.
      properties:
        date:
          type: string
          format: date
        completionRate:
          type: number
          description: Percent of issues done at this point (0–100).
        totalIssues:
          type: integer
        completedIssues:
          type: integer
        openBlockers:
          type: ["integer", "null"]
        provenance:
          $ref: "#/components/schemas/Provenance"
      required:
        - date
        - completionRate
        - totalIssues
        - completedIssues
        - provenance

    BaselineItem:
      type: object
      properties:
        issueId:
          type: string
        title:
          type: string
        plannedStart:
          type: ["string", "null"]
          format: date
        plannedFinish:
          type: ["string", "null"]
          format: date
      required:
        - issueId
        - title

    ProjectBaseline:
      type: object
      description: An approved baseline held by the backend system of record.
      properties:
        projectId:
          type: string
        name:
          type: string
        capturedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/BaselineItem"
        provenance:
          $ref: "#/components/schemas/Provenance"
      required:
        - projectId
        - capturedAt
        - items
        - provenance

    RaidEntry:
      type: object
      description: A Risk, Assumption, Issue or Dependency log entry.
      properties:
        id:
          type: string
        projectId:
          type: string
        type:
          type: string
          enum: [risk, assumption, issue, dependency]
        title:
          type: string
        description:
          type: ["string", "null"]
        severity:
          type: string
