{{- if and .Values.secret.create (not .Values.secret.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omniproject.fullname" . }}-secrets
  labels:
    {{- include "omniproject.labels" . | nindent 4 }}
type: Opaque
# Ships EMPTY on purpose: an empty/default SESSION_SECRET makes the gateway refuse to boot in
# production (fail-fast), so there is never a silently-insecure default. Provide real values via
# External Secrets Operator / Sealed Secrets, or point secret.existingSecret at an out-of-band Secret.
stringData:
  {{- range $k, $v := .Values.secret.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end -}}
